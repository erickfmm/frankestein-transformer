model_class: frankenstein
model:
  dims:
    vocab_size: 50000
    hidden_size: 640
    num_layers: 8
    num_loops: 1
    num_heads: 10
    retention_heads: 10
    layer_pattern:
    - sigmoid_attn
  use_bitnet: false
  norm:
    type: derf
  embedding:
    conv:
      enabled: false
  use_moe: false
  ffn_hidden_size: 2560
  attention:
    titan:
      use_hope: false
training:
  task: mlm
  num_epochs: 4
  batch_size: 3
  dataloader_workers: 2
  max_length: 512
  mlm_probability: 0.15
  max_samples: 6000000
  dataset_batch_size: 15000
  num_workers: 6
  cache_dir: ./temp_data/v2_dataset_cache
  local_parquet_dir: /home/erickfmm/.cache/huggingface/hub/datasets--erickfmm--red_pajama_es_hq_35/snapshots/bd7286c289a95dc3803c375bc36aaaeb138b1eab/train/
  prefer_local_cache: true
  stream_local_parquet: true
  join_temp_data_context_window: 0
  join_temp_data_min_remainder_tokens: 128
  gradient_accumulation_steps: 10
  optimizer:
    optimizer_class: muon
    parameters:
      muon-lr_embeddings: 1e-6
      muon-lr_norms: 5e-6
      muon-lr_attention: 3e-6
      muon-lr_other: 2e-6
      muon-wd_embeddings: 0.01
      muon-wd_norms: 0.001
      muon-wd_attention: 0.01
      muon-wd_other: 0.01
      muon-betas_embeddings:
      - 0.9
      - 0.95
      muon-betas_norms:
      - 0.9
      - 0.95
      muon-betas_attention:
      - 0.9
      - 0.95
      muon-betas_other:
      - 0.9
      - 0.95
      muon-eps_embeddings: 1e-8
      muon-eps_norms: 1e-8
      muon-eps_attention: 1e-8
      muon-eps_other: 1e-8
      muon-momentum: 0.95
      muon-nesterov: true
      muon-ns_steps: 5
      muon-ns_eps: 1e-7
  max_nan_retries: 4
  gradient_log_interval: 10
  csv_log_path: training_metrics_es_arch_sigmoid_derf_muon.csv
  telemetry_log_interval: 5
