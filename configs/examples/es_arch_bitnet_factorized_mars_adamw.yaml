model_class: frankenstein
model:
  vocab_size: 50000
  hidden_size: 512
  num_layers: 8
  num_loops: 1
  num_heads: 8
  layer_pattern: [retnet, standard_attn]
  use_bitnet: true
  norm_type: derf
  use_factorized_embedding: true
  use_embedding_conv: true
  embedding_conv_kernel: 5
  use_hope: false
  use_moe: false
  ffn_hidden_size: 2048
training:
  task: mlm
  num_epochs: 4
  batch_size: 4
  dataloader_workers: 2
  max_length: 512
  mlm_probability: 0.15
  max_samples: 6000000
  dataset_batch_size: 15000
  num_workers: 6
  cache_dir: "./temp_data/v2_dataset_cache"
  local_parquet_dir: "/home/erickfmm/.cache/huggingface/hub/datasets--erickfmm--red_pajama_es_hq_35/snapshots/bd7286c289a95dc3803c375bc36aaaeb138b1eab/train/"
  prefer_local_cache: true
  stream_local_parquet: true
  join_temp_data_context_window: 0
  join_temp_data_min_remainder_tokens: 128
  gradient_accumulation_steps: 8
  optimizer:
    optimizer_class: mars_adamw
    parameters:
      mars_adamw-lr_embeddings: 1e-6
      mars_adamw-lr_norms: 5e-6
      mars_adamw-lr_ode: 1e-7
      mars_adamw-lr_retnet: 5e-6
      mars_adamw-lr_mamba: 2e-6
      mars_adamw-lr_attention: 3e-6
      mars_adamw-lr_other: 2e-6
      mars_adamw-wd_embeddings: 0.01
      mars_adamw-wd_norms: 0.001
      mars_adamw-wd_ode: 0.01
      mars_adamw-wd_retnet: 0.01
      mars_adamw-wd_mamba: 0.01
      mars_adamw-wd_attention: 0.01
      mars_adamw-wd_other: 0.01
      mars_adamw-betas_embeddings: [0.9, 0.95]
      mars_adamw-betas_norms: [0.9, 0.95]
      mars_adamw-betas_ode: [0.9, 0.95]
      mars_adamw-betas_retnet: [0.9, 0.95]
      mars_adamw-betas_mamba: [0.9, 0.95]
      mars_adamw-betas_attention: [0.9, 0.95]
      mars_adamw-betas_other: [0.9, 0.95]
      mars_adamw-eps_embeddings: 1e-8
      mars_adamw-eps_norms: 1e-8
      mars_adamw-eps_ode: 1e-8
      mars_adamw-eps_retnet: 1e-8
      mars_adamw-eps_mamba: 1e-8
      mars_adamw-eps_attention: 1e-8
      mars_adamw-eps_other: 1e-8
  scheduler_total_steps: 9000
  scheduler_warmup_ratio: 0.08
  scheduler_type: constant
  max_nan_retries: 4
  gradient_log_interval: 10
  csv_log_path: "training_metrics_es_arch_bitnet_factorized_mars_adamw.csv"
  telemetry_log_interval: 5