model_class: frankenstein
model:
  vocab_size: 50000
  hidden_size: 768
  num_layers: 8
  num_loops: 1
  num_heads: 12
  retention_heads: 12
  # NSA (Neighborhood Sliding Attention) combined with retnet_attn
  layer_pattern:
    - nsa_attn
    - retnet_attn
    - nsa_attn
    - retnet_attn
    - nsa_attn
    - retnet_attn
    - nsa_attn
    - retnet_attn
  use_bitnet: false
  use_embedding_conv: false
  ffn_hidden_size: 3072
training:
  task: mlm
  num_epochs: 4
  batch_size: 4
  dataloader_workers: 2
  max_length: 512
  mlm_probability: 0.15
  max_samples: 6000000
  dataset_batch_size: 15000
  num_workers: 6
  cache_dir: "./temp_data/v2_dataset_cache"
  local_parquet_dir: "/home/erickfmm/.cache/huggingface/hub/datasets--erickfmm--red_pajama_es_hq_35/snapshots/bd7286c289a95dc3803c375bc36aaaeb138b1eab/train/"
  prefer_local_cache: true
  stream_local_parquet: true
  join_temp_data_context_window: 0
  join_temp_data_min_remainder_tokens: 128
  gradient_accumulation_steps: 8
  optimizer:
    optimizer_class: radam
    parameters:
      radam-lr_embeddings: 1e-6
      radam-lr_norms: 5e-6
      radam-lr_attention: 3e-4
      radam-lr_other: 2e-4
      radam-wd_embeddings: 0.01
      radam-wd_norms: 0.001
      radam-wd_attention: 0.01
      radam-wd_other: 0.01
      radam-betas_attention: [0.9, 0.999]
      radam-betas_other: [0.9, 0.999]
      radam-eps_attention: 1e-8
      radam-eps_other: 1e-8
  scheduler_total_steps: 12000
  max_nan_retries: 4
  gradient_log_interval: 10
  csv_log_path: "training_metrics_es_arch_nsa_retnet_radam.csv"
  telemetry_log_interval: 5