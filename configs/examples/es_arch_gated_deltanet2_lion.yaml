model_class: frankenstein
model:
  vocab_size: 50000
  hidden_size: 768
  num_layers: 8
  num_loops: 1
  num_heads: 12
  retention_heads: 12
  # Gated DeltaNet-2 (arXiv:2605.22791) alternating with standard attention.
  # Gated DeltaNet-2 decouples the scalar delta gate of Gated DeltaNet/KDA
  # into a channel-wise erase gate (key axis) and a channel-wise write gate
  # (value axis), while inheriting the channel-wise decay from KDA. This
  # gives finer-grained memory control and stronger long-context retrieval
  # than Gated DeltaNet. Pairing it with standard_attn preserves some
  # high-precision local interactions (a lightweight hybrid pattern).
  layer_pattern: [gated_deltanet2_attn, standard_attn, gated_deltanet2_attn, standard_attn, gated_deltanet2_attn, standard_attn, gated_deltanet2_attn, standard_attn]
  use_bitnet: false
  norm_type: layer_norm
  use_embedding_conv: false
  ffn_hidden_size: 3072
training:
  task: mlm
  num_epochs: 4
  batch_size: 4
  dataloader_workers: 2
  max_length: 512
  mlm_probability: 0.15
  max_samples: 6000000
  dataset_batch_size: 15000
  num_workers: 6
  cache_dir: "./temp_data/v2_dataset_cache"
  local_parquet_dir: "/home/erickfmm/.cache/huggingface/hub/datasets--erickfmm--red_pajama_es_hq_35/snapshots/bd7286c289a95dc3803c375bc36aaaeb138b1eab/train/"
  prefer_local_cache: true
  stream_local_parquet: true
  join_temp_data_context_window: 0
  join_temp_data_min_remainder_tokens: 128
  gradient_accumulation_steps: 8
  optimizer:
    optimizer_class: lion
    parameters:
      lion-lr_embeddings: 1e-6
      lion-lr_norms: 3e-6
      lion-lr_attention: 2e-4
      lion-lr_other: 1e-4
      lion-wd_embeddings: 0.01
      lion-wd_norms: 0.001
      lion-wd_attention: 0.01
      lion-wd_other: 0.01
      lion-betas_attention: [0.95, 0.98]
      lion-betas_other: [0.95, 0.98]
  scheduler_total_steps: 12000
  max_nan_retries: 4
  gradient_log_interval: 10
  csv_log_path: "training_metrics_es_arch_gated_deltanet2_lion.csv"
  telemetry_log_interval: 5