model_class: frankesteindecoder
model:
  dims:
    vocab_size: 50000
    hidden_size: 768
    num_layers: 12
    num_loops: 1
    num_heads: 12
    retention_heads: 12
    layer_pattern:
    - retnet
    - mamba
    - titan_attn
    - retnet
    mode: decoder
  use_bitnet: false
  norm:
    type: layer_norm
  embedding:
    conv:
      enabled: false
  use_moe: false
  ffn_hidden_size: 3072
  attention:
    titan:
      positional_encoding: rope
training:
  task: mlm
  batch_size: 4
  dataloader_workers: 2
  max_length: 512
  mlm_probability: 0.15
  max_samples: 20000000
  dataset_batch_size: 25000
  num_workers: 8
  cache_dir: ./temp_data/v2_dataset_cache
  optimizer:
    optimizer_class: adamw
    parameters:
      adamw-lr_embeddings: 1e-6
      adamw-lr_norms: 5e-6
      adamw-lr_attention: 3e-6
      adamw-lr_other: 2e-6
      adamw-wd_embeddings: 0.01
      adamw-wd_norms: 0.001
      adamw-wd_attention: 0.01
      adamw-wd_other: 0.01
      adamw-betas_embeddings:
      - 0.9
      - 0.95
      adamw-betas_norms:
      - 0.9
      - 0.95
      adamw-betas_attention:
      - 0.9
      - 0.95
      adamw-betas_other:
      - 0.9
      - 0.95
      adamw-eps_embeddings: 1e-8
      adamw-eps_norms: 1e-8
      adamw-eps_attention: 1e-8
      adamw-eps_other: 1e-8
  gradient_log_interval: 10
