base_model: xlm-roberta-base
tokenizer:
  name_or_path: xlm-roberta-base
  use_fast: true
  trust_remote_code: false
training:
  task: mlm
  num_epochs: 4
  batch_size: 2
  dataloader_workers: 2
  max_length: 256
  mlm_probability: 0.15
  max_samples: 8000000
  dataset_batch_size: 20000
  num_workers: 6
  cache_dir: "./temp_data/v2_dataset_cache"
  local_parquet_dir: "/home/erickfmm/.cache/huggingface/hub/datasets--erickfmm--red_pajama_es_hq_35/snapshots/bd7286c289a95dc3803c375bc36aaaeb138b1eab/train/"
  prefer_local_cache: true
  stream_local_parquet: true
  join_temp_data_context_window: 0
  join_temp_data_min_remainder_tokens: 128
  hf_output_dir: "checkpoints/es_mlm_xlmr_radam"
  gradient_accumulation_steps: 12
  optimizer:
    optimizer_class: radam
    parameters:
      radam-lr_embeddings: 1e-6
      radam-lr_norms: 5e-6
      radam-lr_ode: 1e-7
      radam-lr_retnet: 5e-6
      radam-lr_mamba: 2e-6
      radam-lr_attention: 3e-6
      radam-lr_other: 2e-6
      radam-wd_embeddings: 0.01
      radam-wd_norms: 0.001
      radam-wd_ode: 0.01
      radam-wd_retnet: 0.01
      radam-wd_mamba: 0.01
      radam-wd_attention: 0.01
      radam-wd_other: 0.01
      radam-betas_embeddings: [0.9, 0.95]
      radam-betas_norms: [0.9, 0.95]
      radam-betas_ode: [0.9, 0.95]
      radam-betas_retnet: [0.9, 0.95]
      radam-betas_mamba: [0.9, 0.95]
      radam-betas_attention: [0.9, 0.95]
      radam-betas_other: [0.9, 0.95]
      radam-eps_embeddings: 1e-8
      radam-eps_norms: 1e-8
      radam-eps_ode: 1e-8
      radam-eps_retnet: 1e-8
      radam-eps_mamba: 1e-8
      radam-eps_attention: 1e-8
      radam-eps_other: 1e-8
  gradient_log_interval: 10
  csv_log_path: "training_metrics_es_mlm_xlmr_radam.csv"
  telemetry_log_interval: 5