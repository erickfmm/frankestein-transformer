base_model: microsoft/deberta-v3-base
tokenizer:
  name_or_path: microsoft/deberta-v3-base
  use_fast: true
  trust_remote_code: false
training:
  task: mlm
  num_epochs: 4
  batch_size: 2
  dataloader_workers: 2
  max_length: 256
  mlm_probability: 0.15
  max_samples: 8000000
  dataset_batch_size: 20000
  num_workers: 6
  cache_dir: "./temp_data/v2_dataset_cache"
  local_parquet_dir: "/home/erickfmm/.cache/huggingface/hub/datasets--erickfmm--red_pajama_es_hq_35/snapshots/bd7286c289a95dc3803c375bc36aaaeb138b1eab/train/"
  prefer_local_cache: true
  stream_local_parquet: true
  join_temp_data_context_window: 0
  join_temp_data_min_remainder_tokens: 128
  hf_output_dir: "checkpoints/es_mlm_deberta_soap"
  gradient_accumulation_steps: 16
  optimizer:
    optimizer_class: soap
    parameters:
      soap-lr_embeddings: 1e-6
      soap-lr_norms: 5e-6
      soap-lr_ode: 1e-7
      soap-lr_retnet: 5e-6
      soap-lr_mamba: 2e-6
      soap-lr_attention: 3e-6
      soap-lr_other: 2e-6
      soap-wd_embeddings: 0.01
      soap-wd_norms: 0.001
      soap-wd_ode: 0.01
      soap-wd_retnet: 0.01
      soap-wd_mamba: 0.01
      soap-wd_attention: 0.01
      soap-wd_other: 0.01
      soap-betas_embeddings: [0.9, 0.95]
      soap-betas_norms: [0.9, 0.95]
      soap-betas_ode: [0.9, 0.95]
      soap-betas_retnet: [0.9, 0.95]
      soap-betas_mamba: [0.9, 0.95]
      soap-betas_attention: [0.9, 0.95]
      soap-betas_other: [0.9, 0.95]
      soap-eps_embeddings: 1e-8
      soap-eps_norms: 1e-8
      soap-eps_ode: 1e-8
      soap-eps_retnet: 1e-8
      soap-eps_mamba: 1e-8
      soap-eps_attention: 1e-8
      soap-eps_other: 1e-8
  scheduler_total_steps: 12000
  gradient_log_interval: 10
  csv_log_path: "training_metrics_es_mlm_deberta_soap.csv"
  telemetry_log_interval: 5