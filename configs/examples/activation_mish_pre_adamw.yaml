model_class: frankenstein
model:
  dims:
    vocab_size: 50000
    hidden_size: 512
    num_layers: 6
    num_loops: 1
    num_heads: 8
    retention_heads: 8
    dropout: 0.1
    layer_pattern:
    - standard_attn
    - ode
    mode: encoder
  num_experts: 4
  top_k_experts: 2
  norm:
    type: dynamic_tanh
  use_bitnet: false
  bitnet_routers: false
  use_bitnet_conv: false
  embedding:
    factorized:
      enabled: false
      dim: 128
    conv:
      enabled: false
      kernel: 3
  use_moe: false
  ffn_hidden_size: 1024
  ffn_activation: mish
  attention:
    titan:
      positional_encoding: hope
      hope:
        base: 10000.0
        damping: 0.01
      rope:
        base: 10000.0
        scaling: 1.0
      use_hope: true
training:
  task: mlm
  batch_size: 4
  dataloader_workers: 2
  max_length: 512
  mlm_probability: 0.15
  max_samples: 1000000
  dataset_batch_size: 25000
  num_workers: 8
  cache_dir: ./temp_data/activation_mish_cache
  use_amp: false
  gradient_accumulation_steps: 4
  optimizer:
    optimizer_class: adamw
    parameters:
      adamw-lr_embeddings: 1e-5
      adamw-lr_norms: 5e-5
      adamw-lr_attention: 3e-4
      adamw-lr_other: 2e-4
      adamw-wd_embeddings: 0.01
      adamw-wd_norms: 0.001
      adamw-wd_attention: 0.01
      adamw-wd_other: 0.01
      adamw-betas_attention:
      - 0.9
      - 0.95
      adamw-betas_other:
      - 0.9
      - 0.95
      adamw-eps_attention: 1e-8
      adamw-eps_other: 1e-8
  scheduler_total_steps: 10000
  scheduler_warmup_ratio: 0.1
  scheduler_type: cosine
  grad_clip_max_norm: 5.0
  inf_post_clip_threshold: 100.0
  max_nan_retries: 3
  checkpoint_every_n_steps: 500
  max_rolling_checkpoints: 3
  num_best_checkpoints: 2
  nan_check_interval: 10
  log_gradient_stats: true
  gradient_log_interval: 10
  csv_log_path: training_metrics_activation_mish.csv
  csv_rotate_on_schema_change: true
  gpu_metrics_backend: nvml
  nvml_device_index: 0
  enable_block_grad_norms: true
  telemetry_log_interval: 1
  gpu_temp_guard_enabled: true
  switch_on_thermal: false
  gpu_temp_pause_threshold_c: 90.0
  gpu_temp_resume_threshold_c: 80.0
  gpu_temp_poll_interval_seconds: 30.0
  use_galore: false
  galore_rank: 64
  galore_update_interval: 1
  galore_scale: 1.0
  galore_max_dim: 4096
