model_class: frankenstein
model:
  vocab_size: 50000
  hidden_size: 768
  num_layers: 8
  num_heads: 12
  retention_heads: 12
  layer_pattern: [titan_attn]
  use_bitnet: false
  positional_encoding: rope
  use_moe: false
  ffn_hidden_size: 3072
training:
  task: mlm
  num_epochs: 4
  batch_size: 2
  dataloader_workers: 2
  max_length: 256
  mlm_probability: 0.15
  max_samples: 6000000
  dataset_batch_size: 15000
  num_workers: 6
  cache_dir: "./temp_data/v2_dataset_cache"
  local_parquet_dir: "/home/erickfmm/.cache/huggingface/hub/datasets--erickfmm--red_pajama_es_hq_35/snapshots/bd7286c289a95dc3803c375bc36aaaeb138b1eab/train/"
  prefer_local_cache: true
  stream_local_parquet: true
  join_temp_data_context_window: 0
  join_temp_data_min_remainder_tokens: 128
  gradient_accumulation_steps: 12
  optimizer:
    optimizer_class: adan
    parameters:
      adan-lr_embeddings: 1e-6
      adan-lr_norms: 5e-6
      adan-lr_ode: 1e-7
      adan-lr_retnet: 5e-6
      adan-lr_mamba: 2e-6
      adan-lr_attention: 3e-6
      adan-lr_other: 2e-6
      adan-wd_embeddings: 0.01
      adan-wd_norms: 0.001
      adan-wd_ode: 0.01
      adan-wd_retnet: 0.01
      adan-wd_mamba: 0.01
      adan-wd_attention: 0.01
      adan-wd_other: 0.01
      adan-betas_embeddings: [0.9, 0.95]
      adan-betas_norms: [0.9, 0.95]
      adan-betas_ode: [0.9, 0.95]
      adan-betas_retnet: [0.9, 0.95]
      adan-betas_mamba: [0.9, 0.95]
      adan-betas_attention: [0.9, 0.95]
      adan-betas_other: [0.9, 0.95]
      adan-eps_embeddings: 1e-8
      adan-eps_norms: 1e-8
      adan-eps_ode: 1e-8
      adan-eps_retnet: 1e-8
      adan-eps_mamba: 1e-8
      adan-eps_attention: 1e-8
      adan-eps_other: 1e-8
  scheduler_total_steps: 11000
  max_nan_retries: 4
  gradient_log_interval: 10
  csv_log_path: "training_metrics_es_arch_titan_hope_adan.csv"
  telemetry_log_interval: 5