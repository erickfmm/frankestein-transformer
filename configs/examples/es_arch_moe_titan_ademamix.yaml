model_class: frankenstein
model:
  dims:
    vocab_size: 50000
    hidden_size: 768
    num_layers: 10
    num_loops: 1
    num_heads: 12
    retention_heads: 12
    layer_pattern:
    - titan_attn
    - retnet
  num_experts: 8
  top_k_experts: 2
  use_bitnet: false
  norm:
    type: layer_norm
  embedding:
    conv:
      enabled: false
  use_moe: true
  ffn_hidden_size: 3072
  attention:
    titan:
      use_hope: true
training:
  task: mlm
  num_epochs: 4
  batch_size: 2
  dataloader_workers: 2
  max_length: 256
  mlm_probability: 0.15
  max_samples: 6000000
  dataset_batch_size: 15000
  num_workers: 6
  cache_dir: ./temp_data/v2_dataset_cache
  local_parquet_dir: /home/erickfmm/.cache/huggingface/hub/datasets--erickfmm--red_pajama_es_hq_35/snapshots/bd7286c289a95dc3803c375bc36aaaeb138b1eab/train/
  prefer_local_cache: true
  stream_local_parquet: true
  join_temp_data_context_window: 0
  join_temp_data_min_remainder_tokens: 128
  gradient_accumulation_steps: 16
  optimizer:
    optimizer_class: ademamix
    parameters:
      ademamix-lr_embeddings: 1e-6
      ademamix-lr_norms: 5e-6
      ademamix-lr_attention: 3e-6
      ademamix-lr_other: 2e-6
      ademamix-wd_embeddings: 0.01
      ademamix-wd_norms: 0.001
      ademamix-wd_attention: 0.01
      ademamix-wd_other: 0.01
      ademamix-betas_embeddings:
      - 0.9
      - 0.95
      ademamix-betas_norms:
      - 0.9
      - 0.95
      ademamix-betas_attention:
      - 0.9
      - 0.95
      ademamix-betas_other:
      - 0.9
      - 0.95
      ademamix-eps_embeddings: 1e-8
      ademamix-eps_norms: 1e-8
      ademamix-eps_attention: 1e-8
      ademamix-eps_other: 1e-8
  scheduler_total_steps: 12000
  max_nan_retries: 4
  gradient_log_interval: 10
  csv_log_path: training_metrics_es_arch_moe_titan_ademamix.csv
  telemetry_log_interval: 5
