model_class: frankenstein
model:
  dims:
    vocab_size: 50000
    hidden_size: 128
    num_layers: 4
    num_loops: 1
    num_heads: 1
    layer_pattern:
    - standard_attn
  use_bitnet: false
  norm:
    type: layer_norm
  embedding:
    factorized:
      enabled: true
      dim: 16
    conv:
      kernel: 32
  use_moe: false
  ffn_hidden_size: 512
  ffn_activation: gelu
  attention:
    titan:
      use_hope: false
training:
  task: mlm
  batch_size: 16
  dataloader_workers: 2
  max_length: 512
  mlm_probability: 0.15
  max_samples: 20000000
  dataset_batch_size: 25000
  num_workers: 8
  cache_dir: ./temp_data/v2_dataset_cache
  use_amp: false
  gradient_accumulation_steps: 4
  optimizer:
    optimizer_class: adamw
    parameters:
      adamw-lr_embeddings: 1e-6
      adamw-lr_norms: 5e-6
      adamw-lr_attention: 3e-6
      adamw-lr_other: 2e-6
      adamw-wd_embeddings: 0.01
      adamw-wd_norms: 0.001
      adamw-wd_attention: 0.01
      adamw-wd_other: 0.01
      adamw-betas_embeddings:
      - 0.9
      - 0.95
      adamw-betas_norms:
      - 0.9
      - 0.95
      adamw-betas_attention:
      - 0.9
      - 0.95
      adamw-betas_other:
      - 0.9
      - 0.95
      adamw-eps_embeddings: 1e-8
      adamw-eps_norms: 1e-8
      adamw-eps_attention: 1e-8
      adamw-eps_other: 1e-8
  scheduler_total_steps: 10000
  scheduler_warmup_ratio: 0.1
  scheduler_type: cosine
