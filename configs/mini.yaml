model_class: mini
model:
  dims:
    vocab_size: 50000
    hidden_size: 128
    num_layers: 4
    num_loops: 1
    num_heads: 1
    layer_pattern:
    - standard_attn
  use_bitnet: false
  norm:
    type: layer_norm
  embedding:
    factorized:
      enabled: true
      dim: 16
    conv:
      kernel: 32
  use_moe: false
  ffn_hidden_size: 512
  ffn_activation: gelu
  attention:
    titan:
      use_hope: false
training:
  task: mlm
  batch_size: 64
  dataloader_workers: 2
  max_length: 512
  mlm_probability: 0.15
  max_samples: 20000000
  dataset_batch_size: 25000
  num_workers: 8
  cache_dir: ./temp_data/v2_dataset_cache
  use_amp: true
  gradient_accumulation_steps: 2
  optimizer:
    optimizer_class: lamb
    parameters:
      lamb-lr_embeddings: 1e-6
      lamb-lr_norms: 5e-6
      lamb-lr_attention: 3e-6
      lamb-lr_other: 2e-6
      lamb-wd_embeddings: 0.01
      lamb-wd_norms: 0.001
      lamb-wd_attention: 0.01
      lamb-wd_other: 0.01
      lamb-betas_embeddings:
      - 0.9
      - 0.95
      lamb-betas_norms:
      - 0.9
      - 0.95
      lamb-betas_attention:
      - 0.9
      - 0.95
      lamb-betas_other:
      - 0.9
      - 0.95
      lamb-eps_embeddings: 1e-8
      lamb-eps_norms: 1e-8
      lamb-eps_attention: 1e-8
      lamb-eps_other: 1e-8
  max_nan_retries: 5
  checkpoint_every_n_steps: 50
  nan_check_interval: 1
  gradient_log_interval: 1
  use_galore: true
