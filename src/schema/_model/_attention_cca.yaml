type: object
additionalProperties: false
properties:
  cca:
    type: object
    additionalProperties: false
    properties:
      latent_rank:
        type: integer
        title: "CCA Latent Rank"
        title_es: "Rango Latente CCA"
        description: |-
          Latent width бєЅ for `cca_attn` (Compressed Convolutional Attention,
          arXiv:2510.04476). CCA down-projects q/k/v into this shared latent
          and performs attention entirely inside it (no up-projections),
          reducing parameters, KV-cache, AND FLOPs by the compression factor
          C = hidden_size / cca_latent_rank. `null` defaults to
          `hidden_size // 4` (C=4). Must be divisible by `num_heads`.

          **Examples explained:**
          - `cca_latent_rank=128` with `hidden_size=512`: C=4 compression.
            Latent head dim = 128/8 = 16 (with num_heads=8).
          - `cca_latent_rank=64` with `hidden_size=512`: C=8 compression.
            More aggressive; ~8x fewer attention FLOPs and KV-cache.
          - `cca_latent_rank=null`: defaults to `hidden_size // 4`.
        description_es: |-
          Ancho latente бєЅ para `cca_attn` (Compressed Convolutional Attention,
          arXiv:2510.04476). CCA proyecta q/k/v a este latente compartido y
          realiza la atenciГіn enteramente en Г©l (sin up-proyecciones),
          reduciendo parГЎmetros, cachГ© KV Y FLOPs por el factor de compresiГіn
          C = hidden_size / cca_latent_rank. `null` por defecto es
          `hidden_size // 4` (C=4). Debe ser divisible por `num_heads`.
        examples: [128]
      num_conv_layers:
        type: integer
        title: "CCA Conv Layers"
        title_es: "Capas de ConvoluciГіn CCA"
        description: |-
          Number of convolution layers applied to the packed q/k tensor in
          `cca_attn` (0, 1, or 2). The paper's ablation shows 2 layers (a
          depth-wise causal sequence conv + a head-wise grouped channel conv)
          is optimal. 0 disables convolutions entirely. Default: 2.
        description_es: |-
          NГєmero de capas de convoluciГіn aplicadas al tensor empaquetado q/k
          en `cca_attn` (0, 1 o 2). La ablaciciГіn del paper muestra que 2
          capas (una convoluciГіn causal depth-wise de secuencia + una
          convoluciГіn agrupada de canales por cabeza) es Гіptima. 0 desactiva
          las convoluciones. Por defecto: 2.
        enum: [0, 1, 2]
        examples: [2]
      conv_kernel_seq:
        type: integer
        title: "CCA Seq Conv Kernel"
        title_es: "Kernel Conv Secuencia CCA"
        description: |-
          Kernel size `k_seq` of the depth-wise causal sequence convolution
          in `cca_attn`. Mixes information across positions within the
          compressed latent. Only applies when `cca_num_conv_layers >= 1`.
          Default: 4.
        description_es: |-
          TamaГ±o de kernel `k_seq` de la convoluciГіn causal depth-wise de
          secuencia en `cca_attn`. Mezcla informaciГіn entre posiciones dentro
          del latente comprimido. Solo aplica cuando `cca_num_conv_layers >= 1`.
          Por defecto: 4.
        examples: [4]
      conv_kernel_ch:
        type: integer
        title: "CCA Channel Conv Kernel"
        title_es: "Kernel Conv Canales CCA"
        description: |-
          Kernel size `k_ch` of the head-wise grouped channel convolution in
          `cca_attn`. Mixes information across channels within each head.
          Only applies when `cca_num_conv_layers >= 2`. Default: 3.
        description_es: |-
          TamaГ±o de kernel `k_ch` de la convoluciГіn agrupada de canales por
          cabeza en `cca_attn`. Mezcla informaciГіn entre canales dentro de
          cada cabeza. Solo aplica cuando `cca_num_conv_layers >= 2`.
          Por defecto: 3.
        examples: [3]
      qk_mean:
        type: boolean
        title: "CCA QK-Mean"
        title_es: "QK-Mean CCA"
        description: |-
          Enable the q-k-mean bias in `cca_attn`: adds the pre-convolution
          mean of q and k to the post-convolution values, increasing
          attention-diagonal sparsity when combined with QK-norm. Default:
          True (recommended by the paper's ablation).
        description_es: |-
          Habilita el sesgo q-k-mean en `cca_attn`: aГ±ade la media
          pre-convoluciГіn de q y k a los valores post-convoluciГіn,
          aumentando la dispersiГіn de la diagonal de atenciГіn cuando se
          combina con QK-norm. Por defecto: True.
        examples: [true]
      value_shift:
        type: boolean
        title: "CCA Value-Shift"
        title_es: "Value-Shift CCA"
        description: |-
          Enable value-shift in `cca_attn`: each attention head receives half
          its values from the current token and half from the *previous* token
          (a token-shift inductive bias borrowed from RWKV), implemented via
          two independent value projections. Requires `num_heads` even and
          `cca_latent_rank` even. Default: True.
        description_es: |-
          Habilita value-shift en `cca_attn`: cada cabeza de atenciГіn recibe
          la mitad de sus valores del token actual y la mitad del token
          *anterior* (un sesgo inductivo de token-shift tomado de RWKV),
          implementado con dos proyecciones de valor independientes. Requiere
          `num_heads` par y `cca_latent_rank` par. Por defecto: True.
        examples: [true]
  ccgqa:
    type: object
    additionalProperties: false
    properties:
      query_latent_rank:
        type: integer
        title: "CCGQA Query Latent Rank"
        title_es: "Rango Latente de Query CCGQA"
        description: |-
          Query latent width `E / Cв‚Ѓ` for `ccgqa_attn` (Compressed
          Convolutional Grouped Query Attention, arXiv:2510.04476). CCGQA
          decouples query and KV compression: queries are compressed by `Cв‚Ѓ`
          and keys/values by `Cв‚‚` (в‰Ґ `Cв‚Ѓ`). `null` defaults to
          `hidden_size // 2` (Cв‚Ѓ=2). Must be divisible by `num_heads`.
        description_es: |-
          Ancho latente de query `E / Cв‚Ѓ` para `ccgqa_attn` (Compressed
          Convolutional Grouped Query Attention, arXiv:2510.04476). CCGQA
          desacopla la compresiГіn de query y KV: las consultas se comprimen
          por `Cв‚Ѓ` y las claves/valores por `Cв‚‚` (в‰Ґ `Cв‚Ѓ`). `null` por
          defecto es `hidden_size // 2` (Cв‚Ѓ=2). Debe ser divisible por
          `num_heads`.
        examples: [256]
      kv_latent_rank:
        type: integer
        title: "CCGQA KV Latent Rank"
        title_es: "Rango Latente de KV CCGQA"
        description: |-
          KV latent width `E / Cв‚‚` for `ccgqa_attn`. The constraint
          `ccgqa_query_latent_rank / num_heads == ccgqa_kv_latent_rank /
          ccgqa_num_kv_heads` must hold (same per-head latent dim `d_h`).
          `null` defaults to `hidden_size // 8` (Cв‚‚=8). Must be в‰¤
          `ccgqa_query_latent_rank`.
        description_es: |-
          Ancho latente de KV `E / Cв‚‚` para `ccgqa_attn`. La restricciГіn
          `ccgqa_query_latent_rank / num_heads == ccgqa_kv_latent_rank /
          ccgqa_num_kv_heads` debe cumplirse (misma dimensiГіn latente por
          cabeza `d_h`). `null` por defecto es `hidden_size // 8` (Cв‚‚=8).
          Debe ser в‰¤ `ccgqa_query_latent_rank`.
        examples: [64]
      num_kv_heads:
        type: integer
        title: "CCGQA KV Heads"
        title_es: "Cabezas KV CCGQA"
        description: |-
          Number of KV (group) heads for `ccgqa_attn`. Must divide
          `num_heads`. The group size is `num_heads / ccgqa_num_kv_heads`,
          which also equals `Cв‚‚ / Cв‚Ѓ`. `null` defaults to `num_heads // 4`.
        description_es: |-
          NГєmero de cabezas KV (grupo) para `ccgqa_attn`. Debe dividir
          `num_heads`. El tamaГ±o de grupo es `num_heads /
          ccgqa_num_kv_heads`, que tambiГ©n iguala `Cв‚‚ / Cв‚Ѓ`. `null` por
          defecto es `num_heads // 4`.
        examples: [2]
      num_conv_layers:
        type: integer
        title: "CCGQA Conv Layers"
        title_es: "Capas de ConvoluciГіn CCGQA"
        description: |-
          Number of convolution layers for `ccgqa_attn` (0, 1, or 2). Same
          semantics as `cca_num_conv_layers`. Default: 2.
        description_es: |-
          NГєmero de capas de convoluciГіn para `ccgqa_attn` (0, 1 o 2).
          Mismas semГЎnticas que `cca_num_conv_layers`. Por defecto: 2.
        enum: [0, 1, 2]
        examples: [2]
      conv_kernel_seq:
        type: integer
        title: "CCGQA Seq Conv Kernel"
        title_es: "Kernel Conv Secuencia CCGQA"
        description: |-
          Kernel size of the depth-wise causal sequence convolution in
          `ccgqa_attn`. Default: 4.
        description_es: |-
          TamaГ±o de kernel de la convoluciГіn causal depth-wise de secuencia
          en `ccgqa_attn`. Por defecto: 4.
        examples: [4]
      conv_kernel_ch:
        type: integer
        title: "CCGQA Channel Conv Kernel"
        title_es: "Kernel Conv Canales CCGQA"
        description: |-
          Kernel size of the head-wise grouped channel convolution in
          `ccgqa_attn`. Default: 3.
        description_es: |-
          TamaГ±o de kernel de la convoluciГіn agrupada de canales por cabeza
          en `ccgqa_attn`. Por defecto: 3.
        examples: [3]
      qk_mean:
        type: boolean
        title: "CCGQA QK-Mean"
        title_es: "QK-Mean CCGQA"
        description: |-
          Enable the q-k-mean bias with B_group/E_group for `ccgqa_attn`.
          Default: True.
        description_es: |-
          Habilita el sesgo q-k-mean con B_group/E_group para `ccgqa_attn`.
          Por defecto: True.
        examples: [true]
      value_shift:
        type: boolean
        title: "CCGQA Value-Shift"
        title_es: "Value-Shift CCGQA"
        description: |-
          Enable value-shift for `ccgqa_attn`. Requires
          `ccgqa_num_kv_heads` even and `ccgqa_kv_latent_rank` even.
          Default: True.
        description_es: |-
          Habilita value-shift para `ccgqa_attn`. Requiere
          `ccgqa_num_kv_heads` par y `ccgqa_kv_latent_rank` par.
          Por defecto: True.
        examples: [true]

