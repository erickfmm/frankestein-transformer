type: object
title: Training Configuration
title_es: Configuración de Entrenamiento
description: 'Training hyperparameters and runtime configuration. Includes task-specific settings

  (MLM/SBERT), data loading, optimization, checkpointing, logging, and hardware management.

  Controls the entire training pipeline from data ingestion to model saving.

  '
description_es: 'Hiperparámetros de entrenamiento y configuración de ejecución. Incluye configuraciones

  específicas de tarea (MLM/SBERT), carga de datos, optimización, checkpointing, logging y gestión

  de hardware. Controla todo el pipeline de entrenamiento desde ingesta de datos hasta guardado del modelo.

  '
additionalProperties: false
required:
- task
properties:
  task:
    type: string
    title: Training Task
    title_es: Tarea de Entrenamiento
    description: "Training task type.\n- `mlm`: Masked Language Modeling — tokens are masked and predicted (BERT-style pre-training).\n  Requires `training.optimizer` configuration.\n- `sbert`: Sentence-BERT\
      \ fine-tuning — contrastive learning on sentence pairs/triplets for\n  semantic embeddings. Requires `training.sbert` subsection.\n\n**Impact:** Defines the training objective. `mlm` is for language\
      \ understanding;\n`sbert` is for semantic similarity and retrieval.\n"
    description_es: "Tipo de tarea de entrenamiento.\n- `mlm`: Masked Language Modeling — los tokens se enmascaran y predicen (preentrenamiento estilo BERT).\n  Requiere configuración `training.optimizer`.\n\
      - `sbert`: Sentence-BERT fine-tuning — aprendizaje contrastivo en pares/tripletes para\n  embeddings semánticos. Requiere subsección `training.sbert`.\n\n**Impacto:** Define el objetivo de entrenamiento.\
      \ `mlm` es para comprensión de lenguaje;\n`sbert` is for semantic similarity and retrieval.\n"
    enum:
    - mlm
    - sbert
    examples:
    - mlm
  num_epochs:
    type: integer
    title: Training Epochs
    title_es: Épocas de Entrenamiento
    description: 'Complete passes through the training dataset (MLM only). Typical: 1–3 (large datasets, billions of tokens), 5–10 (medium, millions), 10–20+ (small). Monitor validation loss. For SBERT,
      use `sbert.epochs` instead.


      **Impact:** More epochs = better learning but risk of overfitting. Early stopping recommended.

      '
    description_es: 'Pasadas completas por el dataset de entrenamiento (solo MLM). Típico: 1–3 (datasets grandes, miles de millones de tokens), 5–10 (medios, millones), 10–20+ (pequeños). Monitorear pérdida
      de validación. Para SBERT, usar `sbert.epochs`.


      **Impacto:** Más épocas = mejor aprendizaje pero riesgo de sobreajuste. Early stopping recomendado.

      '
    examples:
    - 5
  batch_size:
    type: integer
    title: Training Batch Size
    title_es: Tamaño de Lote de Entrenamiento
    description: 'Examples per optimizer step (before gradient accumulation). Depends on GPU memory:

      2–8 (8GB), 8–32 (16GB), 32–64 (40GB+). Effective batch = `batch_size × gradient_accumulation_steps`.

      Larger batches = more stable gradients, may need higher LR (linear scaling rule).


      **Examples explained:**

      - `batch_size=4, gradient_accumulation_steps=4`: Effective batch = 16. Good for 8–16GB GPUs with BERT-base (768 hidden). Each step processes 4 samples, accumulates over 4 micro-batches, then updates.
      LR should follow linear scaling from a reference batch size.

      - `batch_size=8, gradient_accumulation_steps=8`: Effective batch = 64. Common for larger GPUs (24GB+). More stable gradients, better for training stability. Increase LR proportionally.

      - `batch_size=1, gradient_accumulation_steps=32`: Effective batch = 32. For extremely memory-constrained scenarios. Single sample per micro-batch, many accumulation steps. Training is slower per epoch
      but uses minimal GPU memory.

      - LR scaling rule: If you double the effective batch size, double the learning rate approximately. Start with a reference (e.g., batch=32, lr=1e-4) and scale linearly.'
    description_es: 'Ejemplos por paso del optimizador (antes de acumulación de gradientes). Depende de memoria GPU:

      2–8 (8GB), 8–32 (16GB), 32–64 (40GB+). Lote efectivo = `batch_size × gradient_accumulation_steps`.

      Lotes más grandes = gradientes más estables, pueden necesitar LR más alto (regla de escalado lineal).


      **Ejemplos explicados:**

      - `batch_size=4, gradient_accumulation_steps=4`: Lote efectivo = 16. Bueno para GPUs de 8–16GB con BERT-base (768 hidden). Cada paso procesa 4 muestras, acumula sobre 4 micro-lotes, luego actualiza.
      LR debe seguir escalado lineal desde un tamaño de lote de referencia.

      - `batch_size=8, gradient_accumulation_steps=8`: Lote efectivo = 64. Común para GPUs más grandes (24GB+). Gradientes más estables, mejor para estabilidad de entrenamiento. Aumentar LR proporcionalmente.

      - `batch_size=1, gradient_accumulation_steps=32`: Lote efectivo = 32. Para escenarios extremadamente limitados en memoria. Una sola muestra por micro-lote, muchos pasos de acumulación. Entrenamiento
      más lento por época pero usa memoria GPU mínima.

      - Regla de escalado de LR: Si duplicas el tamaño de lote efectivo, duplica aproximadamente el learning rate. Empezar con una referencia (ej., batch=32, lr=1e-4) y escalar linealmente.'
    examples:
    - 4
  dataloader_workers:
    type: integer
    title: Dataloader Workers
    title_es: Workers de Carga de Datos
    description: 'Parallel worker processes for data loading/preprocessing. Typical: 0 (main process), 2–4 (small), 8–16 (large). More workers reduce I/O bottlenecks. Limited by CPU cores.


      **Impact:** Increase until CPU is maxed out. Too many workers cause CPU contention.

      '
    description_es: 'Procesos worker paralelos para carga y preprocesamiento de datos. Típico: 0 (proceso principal), 2–4 (pequeño), 8–16 (grande). Más workers reducen cuellos de botella I/O. Limitado por
      núcleos de CPU.


      **Impacto:** Aumentar hasta que CPU llegue al límite. Demasiados workers causan contención de CPU.

      '
    examples:
    - 2
  max_length:
    type: integer
    title: Max Sequence Length
    title_es: Longitud Máxima de Secuencia
    description: 'Maximum token sequence length. 128 (short), 256 (moderate), 512 (BERT standard), 1024+ (long docs).

      Memory cost: O(seq_len²) for standard attention. For sequences > 512, use sparse attention layers

      (`longformer_attn`, `bigbird_attn`, `sparsek_attn`, `nsa_attn`) in `layer_pattern`.


      **Examples explained:**

      - `max_length=128`: Short sequences. Fast training, low memory. Good for sentence-level tasks (classification, NER). Not suitable for document understanding.

      - `max_length=512`: BERT standard. Good balance for most NLP tasks. Covers most paragraphs and medium-length documents. ~110M params model uses ~2GB for attention with batch_size=4.

      - `max_length=1024`: Long documents. Use with sparse attention layers to manage memory. Without sparse attention, memory quadruples vs. 512. Good for QA over long contexts.

      - `max_length=2048+`: Very long contexts. Requires sparse attention (Longformer, BigBird) or recurrent/SSM layers (retnet, mamba) to keep memory manageable. Training is significantly slower. Consider
      `join_temp_data_context_window` for proper sequence construction.'
    description_es: 'Longitud máxima de secuencia de tokens. 128 (corto), 256 (moderado), 512 (estándar BERT), 1024+ (documentos largos).

      Costo de memoria: O(seq_len²) para atención estándar. Para secuencias > 512, usar capas de atención dispersa

      (`longformer_attn`, `bigbird_attn`, `sparsek_attn`, `nsa_attn`) en `layer_pattern`.


      **Ejemplos explicados:**

      - `max_length=128`: Secuencias cortas. Entrenamiento rápido, baja memoria. Bueno para tareas a nivel de oración (clasificación, NER). No apto para comprensión de documentos.

      - `max_length=512`: Estándar BERT. Buen balance para la mayoría de tareas NLP. Cubre la mayoría de párrafos y documentos de longitud media. Modelo ~110M params usa ~2GB para atención con batch_size=4.

      - `max_length=1024`: Documentos largos. Usar con capas de atención dispersa para manejar memoria. Sin atención dispersa, la memoria se cuadruplica vs. 512. Bueno para QA sobre contextos largos.

      - `max_length=2048+`: Contextos muy largos. Requiere atención dispersa (Longformer, BigBird) o capas recurrentes/SSM (retnet, mamba) para mantener memoria manejable. Entrenamiento significativamente
      más lento. Considerar `join_temp_data_context_window` para construcción adecuada de secuencias.'
    examples:
    - 512
  mlm_probability:
    type: number
    title: MLM Masking Probability
    title_es: Probabilidad de Enmascaramiento MLM
    description: 'Fraction of tokens masked for MLM prediction. Standard: 0.15 (15%). Breakdown of masked tokens:

      80% → [MASK] token, 10% → random token, 10% → unchanged.


      **Examples explained:**

      - `0.15`: Standard BERT masking. 15% of tokens are selected for masking. Of those: 80% replaced with [MASK], 10% with random token, 10% kept unchanged. This forces the model to learn bidirectional
      representations.

      - `0.20`: More aggressive masking. Forces stronger representation learning but risks degrading downstream performance if too many tokens are corrupted. Useful for very large datasets where the model
      needs stronger pre-training signal.

      - `0.10`: Lighter masking. Less pre-training signal per batch but preserves more original context. Can be useful for smaller models or fine-tuning stages.

      - `0.30+`: Very aggressive. Generally not recommended — degrades quality as too many tokens are corrupted. The model struggles to learn meaningful representations.'
    description_es: 'Fracción de tokens enmascarados para predicción MLM. Estándar: 0.15 (15%). Desglose de tokens enmascarados:

      80% → token [MASK], 10% → token aleatorio, 10% → sin cambio.


      **Ejemplos explicados:**

      - `0.15`: Enmascaramiento BERT estándar. 15% de tokens se seleccionan para enmascaramiento. De esos: 80% reemplazados con [MASK], 10% con token aleatorio, 10% se mantienen sin cambio. Esto fuerza
      al modelo a aprender representaciones bidireccionales.

      - `0.20`: Enmascaramiento más agresivo. Fuerza aprendizaje de representaciones más fuerte pero arriesga degradar rendimiento downstream si demasiados tokens están corruptos. Útil para datasets muy
      grandes donde el modelo necesita señal de preentrenamiento más fuerte.

      - `0.10`: Enmascaramiento más ligero. Menos señal de preentrenamiento por lote pero preserva más contexto original. Puede ser útil para modelos más pequeños o etapas de fine-tuning.

      - `0.30+`: Muy agresivo. Generalmente no recomendado — degrada calidad porque demasiados tokens están corruptos. El modelo tiene dificultad para aprender representaciones significativas.'
    examples:
    - 0.15
  max_samples:
    type: integer
    title: Max Training Samples
    title_es: Máximo de Muestras de Entrenamiento
    description: 'Total samples before stopping, independent of epochs. Limits training on large datasets.

      Set very high (e.g., 100,000,000) to effectively disable. Stops at `min(num_epochs × dataset_size, max_samples)`.


      **Impact:** Useful for controlled experiments or progressive training without clear epoch limits.

      '
    description_es: 'Total de muestras antes de detenerse, independiente de épocas. Limita entrenamiento en datasets grandes.

      Valor muy alto (ej., 100,000,000) para deshabilitar. Para en `min(num_epochs × dataset_size, max_samples)`.


      **Impacto:** Útil para experimentos controlados o entrenamiento progresivo sin límites de época claros.

      '
    examples:
    - 20000000
  dataset_batch_size:
    type: integer
    title: Dataset Streaming Batch Size
    title_es: Tamaño de Lote de Streaming
    description: 'Internal batch size for streaming dataset. Typical: 10,000–50,000. Larger = less I/O, more memory.

      Independent of training `batch_size`. Tune based on storage speed.


      **Impact:** Should be a multiple of the training `batch_size` for efficiency.

      '
    description_es: 'Tamaño de lote interno para dataset de streaming. Típico: 10,000–50,000. Mayor = menos I/O, más memoria.

      Independiente del `batch_size` de entrenamiento. Ajustar según velocidad de almacenamiento.


      **Impacto:** Debe ser múltiplo del `batch_size` de entrenamiento para eficiencia.

      '
    examples:
    - 25000
  num_workers:
    type: integer
    title: Dataset Streaming Workers
    title_es: Workers de Streaming de Datos
    description: 'Parallel workers for dataset streaming pipeline. Typical: 4–16. More workers = less data loading latency,

      more CPU/memory. Monitor CPU utilization; reduce if bottlenecked.


      **Impact:** Adjust based on available CPU cores. 0 = single-threaded loading.

      '
    description_es: 'Workers paralelos para pipeline de streaming de datos. Típico: 4–16. Más workers = menos latencia de carga,

      más CPU/memoria. Monitorear utilización de CPU; reducir si hay cuello de botella.


      **Impacto:** Ajustar según núcleos de CPU disponibles. 0 = carga single-threaded.

      '
    examples:
    - 8
  cache_dir:
    type: string
    title: Dataset Cache Dir
    title_es: Directorio de Caché de Datos
    description: 'Directory for caching processed datasets to avoid recomputation. SSD preferred. Example: `./temp_data/v2_dataset_cache`.

      Clear cache to force re-processing on schema changes.


      **Impact:** Speeds up subsequent runs. Requires sufficient disk space.

      '
    description_es: 'Directorio para cachear datasets procesados y evitar recómputo. SSD preferido. Ejemplo: `./temp_data/v2_dataset_cache`.

      Limpiar caché para forzar reprocesamiento ante cambios de esquema.


      **Impacto:** Acelera ejecuciones subsecuentes. Requiere suficiente espacio en disco.

      '
    examples:
    - ./temp_data/v2_dataset_cache
  local_parquet_dir:
    type: string
    title: Local Parquet Dir
    title_es: Directorio de Parquet Local
    description: 'Path to local parquet files for offline streaming. Overrides remote fetching. Requires `stream_local_parquet=true`.


      **Impact:** Faster training without network dependency.

      '
    description_es: 'Ruta a archivos parquet locales para streaming offline. Anula descarga remota. Requiere `stream_local_parquet=true`.


      **Impacto:** Entrenamiento más rápido sin dependencia de red.

      '
    examples:
    - /path/to/parquet
  prefer_local_cache:
    type: boolean
    title: Prefer Local Cache
    title_es: Preferir Caché Local
    description: 'Check local cache first before remote download. Speeds up repeated runs. Cache miss falls back to remote.


      **Impact:** Recommended for development and debugging to avoid repeated downloads.

      '
    description_es: 'Verificar caché local primero antes de descarga remota. Acelera ejecuciones repetidas. Fallback a remoto si no hay caché.


      **Impacto:** Recomendado para desarrollo y debugging para evitar descargas repetidas.

      '
    examples:
    - true
  stream_local_parquet:
    type: boolean
    title: Stream Local Parquet
    title_es: Hacer Streaming de Parquet Local
    description: 'Stream from local parquet when `local_parquet_dir` is set. `false` may use remote even if local exists.


      **Impact:** `true` = local only (error if missing). Useful for consistent offline training.

      '
    description_es: 'Hacer streaming desde parquet local cuando `local_parquet_dir` está configurado. `false` puede usar remoto aunque exista local.


      **Impacto:** `true` = solo local (error si falta). Útil para entrenamiento offline consistente.

      '
    examples:
    - true
  join_temp_data_context_window:
    type: integer
    title: Join Temp Data Context Window
    title_es: Ventana de Contexto de Datos Temporales
    description: 'If >0, joins cached token chunks into sequences of this length. Example: 2000 for 2k-token sequences.

      0 = disabled. Must be ≥ `max_length`.


      **Impact:** Useful when the cache contains short segments but longer sequences are needed.

      '
    description_es: 'Si >0, une fragmentos de tokens en caché en secuencias de esta longitud. Ejemplo: 2000 para secuencias de 2k tokens.

      0 = deshabilitado. Debe ser ≥ `max_length`.


      **Impacto:** Útil cuando la caché contiene segmentos cortos pero necesitas secuencias más largas.

      '
    examples:
    - 0
    - 2000
    - 8192
  join_temp_data_min_remainder_tokens:
    type: integer
    title: Min Remainder Tokens
    title_es: Tokens Mínimos Restantes
    description: 'Minimum content tokens in last partial joined window to keep it. Typical: 64–256. Only when `join_temp_data_context_window > 0`.


      **Impact:** Higher = less noise, possible data waste. Lower = more data, includes very short sequences.

      '
    description_es: 'Tokens mínimos en la última ventana parcial unida para conservarla. Típico: 64–256. Solo cuando `join_temp_data_context_window > 0`.


      **Impacto:** Mayor = menos ruido, posible desperdicio de datos. Menor = más datos, incluye secuencias muy cortas.

      '
    examples:
    - 128
  use_amp:
    type: boolean
    title: Use AMP
    title_es: Usar Precisión Mixta Automática
    description: 'Enable FP16 mixed precision. ~50% less memory, faster on GPUs with Tensor Cores (V100, A100, RTX 20/30/40). Auto gradient scaling prevents underflow.


      **Impact:** Highly recommended for modern GPUs. Monitor for NaN; disable if problems occur.

      '
    description_es: 'Habilita precisión mixta FP16. ~50% menos memoria, más rápido en GPUs con Tensor Cores. Escalado automático de gradientes previene underflow.


      **Impacto:** Altamente recomendado para GPUs modernas. Monitorear NaN; deshabilitar si hay problemas.

      '
    examples:
    - false
  gradient_accumulation_steps:
    type: integer
    title: Gradient Accumulation Steps
    title_es: Pasos de Acumulación de Gradientes
    description: 'Accumulate gradients over N mini-batches before optimizer step. Effective batch = `batch_size × N`.

      Example: batch_size=4, accumulation=4 → effective batch=16. LR should scale with effective batch.


      **Impact:** Enables large effective batches without increasing GPU memory. Increases time per epoch.

      '
    description_es: 'Acumular gradientes sobre N mini-lotes antes del paso del optimizador. Lote efectivo = `batch_size × N`.

      Ejemplo: batch_size=4, accumulation=4 → lote efectivo=16. LR debe escalar con lote efectivo.


      **Impacto:** Permite lotes efectivos grandes sin aumentar memoria GPU. Aumenta el tiempo por época.

      '
    examples:
    - 4
  scheduler_total_steps:
    type: integer
    title: Scheduler Total Steps
    title_es: Pasos Totales del Scheduler
    description: 'Total optimizer steps for LR schedule. Formula: `(num_epochs × dataset_size) / (batch_size × gradient_accumulation_steps)`.

      Too short: schedule ends early, constant LR; too long: never reaches final LR.


      **Impact:** Overestimate for dynamic duration. Warmup and decay are computed over this value.

      '
    description_es: 'Pasos totales del optimizador para schedule de LR. Fórmula: `(num_epochs × dataset_size) / (batch_size × gradient_accumulation_steps)`.

      Muy corto: schedule termina temprano, LR constante; muy largo: nunca alcanza LR final.


      **Impacto:** Sobreestimar para duración dinámica. Warmup y decay se calculan sobre este valor.

      '
    examples:
    - 10000
  scheduler_warmup_ratio:
    type: number
    title: Scheduler Warmup Ratio
    title_es: Ratio de Calentamiento del Scheduler
    description: 'Fraction of `scheduler_total_steps` for LR warmup. Typical: 0.05–0.1. Larger models need more warmup (0.1), smaller less (0.05).


      **Impact:** Too much warmup = wasted time with suboptimal LR. Too little = unstable early training.

      '
    description_es: 'Fracción de `scheduler_total_steps` para calentamiento de LR. Típico: 0.05–0.1. Modelos grandes necesitan más warmup (0.1), pequeños menos (0.05).


      **Impacto:** Demasiado warmup = tiempo perdido con LR subóptimo. Muy poco = entrenamiento temprano inestable.

      '
    examples:
    - 0.1
  scheduler_type:
    type: string
    title: LR Scheduler
    title_es: Scheduler de LR
    description: 'LR decay strategy.

      - `cosine`: smooth cosine decay to near-zero — **recommended for pre-training**.

      - `constant`: maintains initial LR throughout training — rarely ideal.

      - `linear_warmup_then_constant`: warms up, then holds constant — good for fine-tuning.


      **Examples explained:**

      - `cosine` with `scheduler_total_steps=10000, scheduler_warmup_ratio=0.1`: LR starts at 0, warms up linearly for 1000 steps (10%), then decays following a cosine curve to near-zero over the remaining
      9000 steps. Best for training from scratch or pre-training. The smooth decay helps the model converge to a good minimum.

      - `linear_warmup_then_constant` with `scheduler_total_steps=10000, scheduler_warmup_ratio=0.1`: LR warms up for 1000 steps, then stays constant for the remaining 9000 steps. Good for fine-tuning a
      pretrained model where you don''t want large LR decay that could disrupt learned representations.

      - `constant`: LR stays at initial value. Simplest option but rarely optimal — no warmup means early steps can be unstable, and no decay can lead to bouncing around the minimum.'
    description_es: 'Estrategia de decaimiento de LR.

      - `cosine`: decaimiento coseno suave a casi cero — **recomendado para preentrenamiento**.

      - `constant`: mantiene LR inicial durante todo el entrenamiento — raramente ideal.

      - `linear_warmup_then_constant`: calienta y luego mantiene constante — bueno para fine-tuning.


      **Ejemplos explicados:**

      - `cosine` con `scheduler_total_steps=10000, scheduler_warmup_ratio=0.1`: LR empieza en 0, calienta linealmente por 1000 pasos (10%), luego decae siguiendo una curva coseno a casi cero en los 9000
      pasos restantes. Mejor para entrenamiento desde cero o preentrenamiento. El decaimiento suave ayuda al modelo a converger a un buen mínimo.

      - `linear_warmup_then_constant` con `scheduler_total_steps=10000, scheduler_warmup_ratio=0.1`: LR calienta por 1000 pasos, luego se mantiene constante por los 9000 pasos restantes. Bueno para fine-tuning
      de un modelo preentrenado donde no se quiere un gran decaimiento de LR que pueda perturbar las representaciones aprendidas.

      - `constant`: LR se mantiene en el valor inicial. La opción más simple pero raramente óptima — sin warmup los pasos tempranos pueden ser inestables, y sin decaimiento se puede oscilar alrededor del
      mínimo.'
    enum:
    - cosine
    - constant
    - linear_warmup_then_constant
    examples:
    - cosine
  grad_clip_max_norm:
    type: number
    title: Gradient Clipping Max Norm
    title_es: Norma Máxima de Recorte de Gradientes
    description: 'Max allowed gradient norm. Gradients exceeding this are scaled down. Typical: 1.0–10.0.

      Set 0 to disable. If consistently hitting threshold → increase; if training diverges → decrease.


      **Impact:** Prevents exploding gradients. Monitor norms in logs to adjust.

      '
    description_es: 'Norma máxima de gradiente permitida. Gradientes que excedan esto se escalan hacia abajo.

      Típico: 1.0–10.0. 0 para deshabilitar. Si se alcanza constantemente → aumentar; si diverge → disminuir.


      **Impacto:** Previene gradientes explosivos. Monitorear normas en logs para ajustar.

      '
    examples:
    - 5.0
  inf_post_clip_threshold:
    type: number
    title: Inf Post-Clip Threshold
    title_es: Umbral Inf Post-Recorte
    description: 'If any gradient norm exceeds this after clipping, flag it. Typical: 50–200. Must be > `grad_clip_max_norm`. Logging only.


      **Impact:** Helps identify training problems without stopping.

      '
    description_es: 'Si alguna norma de gradiente excede esto después del recorte, marcarla. Típico: 50–200. Debe ser > `grad_clip_max_norm`. Solo logging.


      **Impacto:** Ayuda a identificar problemas de entrenamiento sin detenerlo.

      '
    examples:
    - 100.0
  max_nan_retries:
    type: integer
    title: Max NaN Retries
    title_es: Reintentos Máximos por NaN
    description: 'Max retries on NaN/Inf gradients before stopping. Typical: 3–10. Skips corrupted batches.

      If NaNs persist, investigate data quality, LR, or numerical stability.


      **Impact:** Too low = stops on transient problems. Too high = wastes time on systematic issues.

      '
    description_es: 'Reintentos máximos ante gradientes NaN/Inf antes de detenerse. Típico: 3–10. Omite lotes corruptos.

      Si NaNs persisten, investigar calidad de datos, LR o estabilidad numérica.


      **Impacto:** Muy bajo = se detiene en problemas transitorios. Muy alto = pierde tiempo en problemas sistemáticos.

      '
    examples:
    - 3
  checkpoint_every_n_steps:
    type: integer
    title: Checkpoint Frequency
    title_es: Frecuencia de Checkpoints
    description: 'Save rolling checkpoint every N steps. Typical: 500–5000. More often = less data loss on crash, more disk I/O.


      **Impact:** Balance with disk speed. For long training runs (weeks) use shorter intervals.

      '
    description_es: 'Guardar checkpoint rodante cada N pasos. Típico: 500–5000. Más frecuente = menos pérdida de datos en crash, más I/O.


      **Impacto:** Balancear con velocidad de disco. Para entrenamientos largos (semanas) usar intervalos más cortos.

      '
    examples:
    - 500
  max_rolling_checkpoints:
    type: integer
    title: Max Rolling Checkpoints
    title_es: Máximo de Checkpoints Rodantes
    description: 'Max rolling checkpoints kept. Oldest deleted when exceeded. Typical: 2–5. Disk ≈ `checkpoint_size × max_rolling_checkpoints`.


      **Impact:** 1 = only the latest. Rolling checkpoints ≠ best checkpoints (not auto-deleted).

      '
    description_es: 'Máximo de checkpoints rodantes conservados. El más antiguo se elimina al exceder. Típico: 2–5. Espacio ≈ `checkpoint_size × max_rolling_checkpoints`.


      **Impacto:** 1 = solo el último. Checkpoints rodantes ≠ mejores checkpoints (no se eliminan automáticamente).

      '
    examples:
    - 3
  num_best_checkpoints:
    type: integer
    title: Best Checkpoints
    title_es: Mejores Checkpoints
    description: 'Number of best checkpoints kept permanently (by validation loss). Typical: 1–3. Not auto-deleted.


      **Impact:** Useful for ensembling or selecting among models with similar performance.

      '
    description_es: 'Número de mejores checkpoints conservados permanentemente (por pérdida de validación). Típico: 1–3. No se eliminan automáticamente.


      **Impacto:** Útil para ensamblado o selección entre modelos con rendimiento similar.

      '
    examples:
    - 2
  nan_check_interval:
    type: integer
    title: NaN Check Interval
    title_es: Intervalo de Verificación de NaN
    description: 'Steps between NaN/Inf checks. Typical: 10–100. Critical for mixed precision. Combined with `max_nan_retries` for recovery.


      **Impact:** More frequent = faster detection, small overhead.

      '
    description_es: 'Pasos entre verificaciones de NaN/Inf. Típico: 10–100. Crítico para precisión mixta. Combinado con `max_nan_retries` para recuperación.


      **Impacto:** Más frecuente = detección más rápida, pequeño overhead.

      '
    examples:
    - 10
  log_gradient_stats:
    type: boolean
    title: Log Gradient Stats
    title_es: Registrar Estadísticas de Gradientes
    description: 'Log per-layer gradient norms, min/max. `true` for debugging/tuning, `false` for production. Combined with `enable_block_grad_norms`.


      **Impact:** Helps identify dead/exploding gradients in specific layers.

      '
    description_es: 'Registrar normas de gradiente por capa, min/max. `true` para debugging/ajuste, `false` para producción. Combinado con `enable_block_grad_norms`.


      **Impacto:** Ayuda a identificar gradientes muertos/explotando en capas específicas.

      '
    examples:
    - true
  gradient_log_interval:
    type: integer
    title: Gradient Log Interval
    title_es: Intervalo de Log de Gradientes
    description: 'Steps between gradient stat logs (when `log_gradient_stats=true`). Typical: 10–100. Reduce once training is stable.

      '
    description_es: 'Pasos entre logs de estadísticas de gradiente (cuando `log_gradient_stats=true`). Típico: 10–100. Reducir una vez estable.

      '
    examples:
    - 10
  csv_log_path:
    type: string
    title: CSV Metrics Log Path
    title_es: Ruta de Log de Métricas CSV
    description: 'File path for step-level training metrics in CSV format. Includes loss, LR, gradient norms, GPU metrics, telemetry.


      **Impact:** Grows with long training runs. Compatible with `csv_rotate_on_schema_change`.

      '
    description_es: 'Ruta de archivo para métricas de entrenamiento por paso en formato CSV. Incluye loss, LR, normas de gradiente, métricas GPU, telemetría.


      **Impacto:** Crece con entrenamientos largos. Compatible con `csv_rotate_on_schema_change`.

      '
    examples:
    - training_metrics.csv
  csv_rotate_on_schema_change:
    type: boolean
    title: CSV Rotate on Schema Change
    title_es: Rotar CSV al Cambiar Esquema
    description: 'Rotate CSV file (backup + new) when schema changes. Prevents corruption from column mismatches.

      '
    description_es: 'Rotar archivo CSV (respaldo + nuevo) cuando el esquema cambia. Previene corrupción por desajuste de columnas.

      '
    examples:
    - true
  gpu_metrics_backend:
    type: string
    title: GPU Metrics Backend
    title_es: Backend de Métricas GPU
    description: 'GPU telemetry backend. `nvml` = NVIDIA metrics (temp, memory, utilization). `none` = disabled. Required for `gpu_temp_guard_enabled`.

      '
    description_es: 'Backend de telemetría GPU. `nvml` = métricas NVIDIA (temp, memoria, utilización). `none` = deshabilitado. Requerido para `gpu_temp_guard_enabled`.

      '
    enum:
    - nvml
    - none
    examples:
    - nvml
  nvml_device_index:
    type: integer
    title: NVML Device Index
    title_es: Índice de Dispositivo NVML
    description: 'GPU index to monitor (0 = first GPU). Must match training device. Single GPU: always 0.

      '
    description_es: 'Índice de GPU a monitorear (0 = primera GPU). Debe coincidir con el dispositivo de entrenamiento. GPU única: siempre 0.

      '
    examples:
    - 0
  enable_block_grad_norms:
    type: boolean
    title: Per-Block Gradient Norms
    title_es: Normas de Gradiente por Bloque
    description: 'Log gradient norms per block (embeddings, attention, FFN, etc.) in CSV. `true` for debugging, `false` for production.


      **Impact:** Detailed insight into gradient flow through model components.

      '
    description_es: 'Registrar normas de gradiente por bloque (embeddings, atención, FFN, etc.) en CSV. `true` para debugging, `false` para producción.


      **Impacto:** Insight detallado del flujo de gradientes a través de componentes del modelo.

      '
    examples:
    - true
  telemetry_log_interval:
    type: integer
    title: Telemetry Log Interval
    title_es: Intervalo de Log de Telemetría
    description: 'Steps between heavy telemetry logs (GPU metrics, per-block gradient norms). Typical: 1–10. Set 1 for max visibility.

      '
    description_es: 'Pasos entre logs de telemetría pesada (métricas GPU, normas de gradiente por bloque). Típico: 1–10. 1 para máxima visibilidad.

      '
    examples:
    - 1
  gpu_temp_guard_enabled:
    type: boolean
    title: GPU Temp Guard
    title_es: Guardia de Temperatura GPU
    description: 'Strict GPU temperature monitoring (CUDA only). Pauses/resumes training based on thresholds. Requires `gpu_metrics_backend=nvml`.


      **Impact:** Critical to prevent overheating under sustained loads. `true` for safety.

      '
    description_es: 'Monitoreo estricto de temperatura GPU (solo CUDA). Pausa/reanuda entrenamiento según umbrales. Requiere `gpu_metrics_backend=nvml`.


      **Impacto:** Crítico para prevenir sobrecalentamiento en cargas sostenidas. `true` para seguridad.

      '
    examples:
    - true
  switch_on_thermal:
    type: boolean
    title: Switch on Thermal
    title_es: Cambiar en Evento Térmico
    description: '`true` = critical temp triggers GPU→CPU fallback, auto-resume on cooldown. `false` = pause only.


      **Impact:** `true` maximizes progress but may cause corrupt states. `false` is safer.

      '
    description_es: '`true` = temp crítica activa fallback GPU→CPU, auto-reanudación al enfriar. `false` = solo pausa.


      **Impacto:** `true` maximiza progreso pero puede causar estados corruptos. `false` más seguro.

      '
    examples:
    - false
    - true
  gpu_temp_pause_threshold_c:
    type: number
    title: GPU Pause Temp
    title_es: Temp de Pausa GPU (°C)
    description: 'Temp (°C) to pause training. Typical: 85–95. Set below GPU Tjmax (usually 100–110°C). Must be > `gpu_temp_resume_threshold_c`.

      '
    description_es: 'Temp (°C) para pausar entrenamiento. Típico: 85–95. Debajo del Tjmax de la GPU (usualmente 100–110°C). Debe ser > `gpu_temp_resume_threshold_c`.

      '
    examples:
    - 90.0
  gpu_temp_resume_threshold_c:
    type: number
    title: GPU Resume Temp
    title_es: Temp de Reanudación GPU (°C)
    description: 'Temp (°C) to resume training after pause. Typical: 70–85. Must be < `gpu_temp_pause_threshold_c` by ≥5–10°C (hysteresis).

      '
    description_es: 'Temp (°C) para reanudar entrenamiento tras pausa. Típico: 70–85. Debe ser < `gpu_temp_pause_threshold_c` por ≥5–10°C (histéresis).

      '
    examples:
    - 80.0
  gpu_temp_critical_threshold_c:
    type: number
    title: GPU Critical Temp
    title_es: Temp Crítica GPU (°C) — logging only
    description: 'Informational logging marker for severe thermal events. Null = disabled. Set > `gpu_temp_pause_threshold_c`.

      '
    description_es: 'Marcador informativo para eventos térmicos severos. Null = deshabilitado. Poner > `gpu_temp_pause_threshold_c`.

      '
    examples:
    - 95.0
  gpu_temp_poll_interval_seconds:
    type: number
    title: GPU Temp Poll Interval
    title_es: Intervalo de Sondeo de Temp GPU (s)
    description: 'Seconds between temp checks during cooldown wait. Typical: 10–60. Shorter = faster resume but more overhead.

      '
    description_es: 'Segundos entre verificaciones de temp durante espera de enfriamiento. Típico: 10–60. Más corto = reanudación más rápida pero más overhead.

      '
    examples:
    - 30.0
  use_galore:
    type: boolean
    title: Enable GaLore
    title_es: Habilitar GaLore
    description: 'Gradient Low-Rank Projection for memory-efficient training of large models (>1B params).

      Projects optimizer states to low-rank subspace. Requires `galore_rank`, `galore_update_interval`, `galore_scale`, `galore_max_dim`.


      **Impact:** Reduces optimizer memory from O(P×2) to O(P×rank). Computational overhead from projection.

      '
    description_es: 'Proyección de Gradientes de Bajo Rango para entrenamiento eficiente de modelos grandes (>1B params).

      Proyecta estados del optimizador a subespacio de bajo rango. Requiere `galore_rank`, `galore_update_interval`, `galore_scale`, `galore_max_dim`.


      **Impacto:** Reduce memoria del optimizador de O(P×2) a O(P×rank). Overhead computacional por proyección.

      '
    examples:
    - false
  galore_rank:
    type: integer
    title: GaLore Rank
    title_es: Rango de GaLore
    description: 'Low-rank projection dimension. Typical: 16–128. Memory savings ≈ `1 − (rank / param_dim)`. Start with `hidden_size/12`.

      '
    description_es: 'Dimensión de proyección de bajo rango. Típico: 16–128. Ahorro ≈ `1 − (rank / param_dim)`. Empezar con `hidden_size/12`.

      '
    examples:
    - 64
  galore_update_interval:
    type: integer
    title: GaLore Update Interval
    title_es: Intervalo de Actualización GaLore
    description: 'Steps between projection matrix recomputation. Typical: 1–10. 1 = every step (accurate, slower), 10 = every 10 steps (faster).


      **Impact:** Balance between optimization accuracy and speed.

      '
    description_es: 'Pasos entre recómputo de matriz de proyección. Típico: 1–10. 1 = cada paso (preciso, lento), 10 = cada 10 pasos (rápido).


      **Impacto:** Balance entre precisión de optimización y velocidad.

      '
    examples:
    - 1
  galore_scale:
    type: number
    title: GaLore Gradient Scale
    title_es: Escala de Gradiente GaLore
    description: 'Scaling factor for projected gradients. Typical: 1.0. Scale down if unstable, scale up if too slow.

      '
    description_es: 'Factor de escala para gradientes proyectados. Típico: 1.0. Reducir si inestable, aumentar si muy lento.

      '
    examples:
    - 1.0
  galore_max_dim:
    type: integer
    title: GaLore Max Tensor Dim
    title_es: Dim Máxima de Tensor GaLore
    description: 'Max tensor dimension for GaLore projection. Smaller tensors use standard optimizer. Typical: 4096 or `hidden_size`.


      **Impact:** Avoids overhead on small tensors where projection isn''t worth it.

      '
    description_es: 'Dimensión máxima de tensor para proyección GaLore. Tensores más pequeños usan optimizador estándar. Típico: 4096 o `hidden_size`.


      **Impacto:** Evita overhead en tensores pequeños donde la proyección no vale la pena.

      '
    examples:
    - 4096
  hf_output_dir:
    type: string
    title: HF Output Dir
    title_es: Directorio de Salida HuggingFace
    description: 'Directory for saving final model via `save_pretrained()` when `base_model` is set. HuggingFace format: `config.json`, `pytorch_model.bin`, tokenizer.


      **Impact:** Only applies with `base_model`. For models from scratch, checkpoints are saved differently.

      '
    description_es: 'Directorio para guardar modelo final con `save_pretrained()` cuando `base_model` está configurado. Formato HuggingFace: `config.json`, `pytorch_model.bin`, tokenizador.


      **Impacto:** Solo aplica con `base_model`. Para modelos desde cero, los checkpoints se guardan diferente.

      '
    examples:
    - checkpoints/hf_final
