type: object
description: |-
  UltraConfig model parameters. All architectural hyperparameters that define the model's
  structure, capacity, and behavior. Required when building a model from scratch (i.e., when
  `base_model` is not set). Includes dimensions (vocab_size, hidden_size, num_layers), layer
  composition (layer_pattern with 20 mixer types), normalization (norm_type), and advanced
  features like MoE (use_moe, num_experts), factorized embeddings (use_factorized_embedding),
  positional encodings (positional_encoding: hope/rope), and ODE-style continuous depth blocks.

  **Examples explained:**
  - Typical BERT-base style: `hidden_size=768, num_layers=12, num_heads=12, ffn_hidden_size=3072` — ~110M params, good starting point for MLM pre-training.
  - Memory-efficient: `use_factorized_embedding=true, factorized_embedding_dim=128, use_moe=false` — reduces embedding params ~4.5× for large vocabularies.
  - Experimental hybrid: `layer_pattern: [retnet, titan_attn, mamba, standard_attn, ode]` — mixes recurrent, attention, state-space, and continuous-depth layers for diverse representation learning.
description_es: |-
  Parámetros UltraConfig del modelo. Todos los hiperparámetros arquitectónicos que definen
  la estructura, capacidad y comportamiento del modelo. Obligatorio al construir un modelo desde
  cero (cuando `base_model` no está configurado). Incluye dimensiones (vocab_size, hidden_size,
  num_layers), composición de capas (layer_pattern con 19 tipos de mixer), normalización
  (norm_type) y características avanzadas como MoE (use_moe, num_experts), embeddings
  factorizados (use_factorized_embedding), codificaciones posicionales (positional_encoding:
  hope/rope) y bloques ODE de profundidad continua.

  **Ejemplos explicados:**
  - Estilo BERT-base típico: `hidden_size=768, num_layers=12, num_heads=12, ffn_hidden_size=3072` — ~110M params, buen punto de partida para preentrenamiento MLM.
  - Eficiente en memoria: `use_factorized_embedding=true, factorized_embedding_dim=128, use_moe=false` — reduce params de embedding ~4.5× for large vocabularies.
  - Híbrido experimental: `layer_pattern: [retnet, titan_attn, mamba, standard_attn, ode]` — mezcla capas recurrentes, de atención, de espacio de estados y de profundidad continua para aprendizaje de representaciones diverso.
additionalProperties: false
required:
  - vocab_size
  - hidden_size
  - num_layers
  - num_heads
  - layer_pattern
properties:
  vocab_size:
    type: integer
    title: "Vocabulary Size"
    title_es: "Tamaño de Vocabulario"
    description: |-
      Number of unique tokens in the model's vocabulary. Must match the tokenizer's vocab size.
      Typical values: 30k–100k. Larger vocabularies improve language coverage but increase embedding
      parameters (`vocab_size × hidden_size`).

      **Examples explained:**
      - `vocab_size=30000`: Common for English-only models (BERT). Smaller vocab = fewer embedding params, faster lookup. May struggle with rare words or multilingual text.
      - `vocab_size=50000`: Multilingual BERT-style. Good coverage for 100+ languages with shared subword units. ~38M embedding params with hidden_size=768.
      - `vocab_size=100000`: Very large vocab for code or highly multilingual models. ~77M embedding params — strongly consider `use_factorized_embedding=true` to reduce this cost.
      - With `use_factorized_embedding=true` and `factorized_embedding_dim=128`: vocab_size=50k, hidden=768 → embedding params drop from 38.4M to ~8.4M (4.5× reduction). Quality impact is typically negligible for vocabs > 10k.
      - If using `base_model`: vocab_size must exactly match the pretrained model's vocabulary. Mismatch causes token ID corruption and unrecoverable training failure.
    description_es: |-
      Número de tokens únicos en el vocabulario del modelo. Debe coincidir con el tamaño del
      vocabulario del tokenizador. Valores típicos: 30k–100k. Vocabularios más grandes mejoran la
      cobertura lingüística pero aumentan los parámetros de embedding (`vocab_size × hidden_size`).

      **Ejemplos explicados:**
      - `vocab_size=30000`: Común para modelos solo en inglés (BERT). Vocab más pequeño = menos params de embedding, inferencia más rápida. Puede tener problemas con palabras raras o texto multilingüe.
      - `vocab_size=50000`: Estilo BERT multilingüe. Buena cobertura para 100+ idiomas con unidades sub-palabra compartidas. ~38M params de embedding con hidden_size=768.
      - `vocab_size=100000`: Vocabulario muy grande para código o modelos altamente multilingües. ~77M params de embedding — considerar seriamente `use_factorized_embedding=true` para reducir este costo.
      - Con `use_factorized_embedding=true` y `factorized_embedding_dim=128`: vocab_size=50k, hidden=768 → params de embedding bajan de 38.4M a ~8.4M (reducción 4.5×). El impacto en calidad es típicamente insignificante para vocabularios > 10k.
      - Si se usa `base_model`: vocab_size debe coincidir exactamente con el vocabulario del modelo preentrenado. Una discrepancia causa corrupción de IDs de token y falla de entrenamiento irrecuperable.
    examples: [50000]
  hidden_size:
    type: integer
    title: "Hidden Dimension"
    title_es: "Dimensión Oculta"
    description: |-
      Dimension of the model's hidden representations. Key size parameter affecting capacity
      and memory. Typical: 512 (small), 768 (BERT-base), 1024 (BERT-large), 2048+ (large models).
      **Must be divisible by `num_heads`.**

      **Examples explained:**
      - `hidden_size=768` with `num_heads=12` → 64 dimensions per head. Standard BERT-base configuration, good balance of capacity and memory (~110M total params with 12 layers).
      - `hidden_size=512` with `num_heads=8` → 64 dimensions per head. Compact model for resource-constrained environments or fast prototyping (~40M params).
      - `hidden_size=1024` with `num_heads=16` → 64 dimensions per head. BERT-large scale, higher capacity for complex tasks (~340M params).
      - `hidden_size=2048` with `num_heads=32` → 64 dimensions per head. Large model scale, requires significant GPU memory. Consider factorized embeddings and MoE to manage parameter count.
      - Golden rule: per-head dimension should be ≥ 64. Values below 48 degrade attention quality. Use `hidden_size / num_heads >= 64` as a design constraint.
    description_es: |-
      Dimensión de las representaciones ocultas del modelo. Parámetro clave de tamaño que afecta
      capacidad y memoria. Típico: 512 (pequeño), 768 (BERT-base), 1024 (BERT-large), 2048+
      (modelos grandes). **Debe ser divisible por `num_heads`.**

      **Ejemplos explicados:**
      - `hidden_size=768` con `num_heads=12` → 64 dimensiones por cabeza. Configuración BERT-base estándar, buen balance de capacidad y memoria (~110M params totales con 12 capas).
      - `hidden_size=512` con `num_heads=8` → 64 dimensiones por cabeza. Modelo compacto para entornos con recursos limitados o prototipado rápido (~40M params).
      - `hidden_size=1024` con `num_heads=16` → 64 dimensiones por cabeza. Escala BERT-large, mayor capacidad para tareas complejas (~340M params).
      - `hidden_size=2048` con `num_heads=32` → 64 dimensiones por cabeza. Escala de modelo grande, requiere memoria GPU significativa. Considerar embeddings factorizados y MoE para manejar el conteo de parámetros.
      - Regla de oro: dimensión por cabeza debe ser ≥ 64. Valores por debajo de 48 degradan calidad de atención. Usar `hidden_size / num_heads >= 64` como restricción de diseño.
    examples: [768]
  num_layers:
    type: integer
    title: "Number of Layers"
    title_es: "Número de Capas"
    description: |-
      Number of physical transformer layers in the model stack. Typical: 6 (small), 12 (BERT-base), 24 (BERT-large).
      More layers increase depth and capacity for hierarchical representations but make training harder (gradient flow).

      **Examples explained:**
      - `num_layers=6` with `num_loops=1`: 6 physical layers. Compact model, fast training. Good for small datasets (<10M tokens) or rapid experimentation.
      - `num_layers=6` with `num_loops=2`: 6 physical, 12 logical layers. Same parameter count as 6 layers but 2× compute depth. Each layer in `layer_pattern` runs twice. Useful when you want more sequential computation without adding parameters.
      - `num_layers=12` with `num_loops=1`: Standard BERT-base depth. 12 distinct layers each with their own weights. Good balance for most tasks.
      - `num_layers=24` with `num_loops=1`: BERT-large depth. Requires careful training (Pre-LN, gradient clipping, warmup). Use for large datasets and complex tasks.
      - Relationship with `num_loops`: Logical depth = `num_layers × num_loops`. Use loops to increase effective depth without parameter explosion. Loops share weights across iterations, trading capacity for compute.
    description_es: |-
      Número de capas físicas del transformer. Típico: 6 (pequeño), 12 (BERT-base), 24 (BERT-large).
      Más capas aumentan la profundidad y capacidad para representaciones jerárquicas pero dificultan el entrenamiento (flujo de gradientes).

      **Ejemplos explicados:**
      - `num_layers=6` con `num_loops=1`: 6 capas físicas. Modelo compacto, entrenamiento rápido. Bueno para datasets pequeños (<10M tokens) o experimentación rápida.
      - `num_layers=6` con `num_loops=2`: 6 capas físicas, 12 capas lógicas. Mismos parámetros que 6 capas pero 2× profundidad de cómputo. Cada capa en `layer_pattern` se ejecuta dos veces. Útil cuando se quiere más cómputo secuencial sin agregar parámetros.
      - `num_layers=12` con `num_loops=1`: Profundidad BERT-base estándar. 12 capas distintas cada una con sus propios pesos. Buen balance para la mayoría de tareas.
      - `num_layers=24` con `num_loops=1`: Profundidad BERT-large. Requiere entrenamiento cuidadoso (Pre-LN, gradient clipping, warmup). Usar para datasets grandes y tareas complejas.
      - Relación con `num_loops`: Profundidad lógica = `num_layers × num_loops`. Usar loops para aumentar profundidad efectiva sin explosión de parámetros. Los loops comparten pesos entre iteraciones, intercambiando capacidad por cómputo.
    examples: [12]
  num_loops:
    type: integer
    title: "Logical Loops"
    title_es: "Bucles Lógicos"
    description: |
      Number of times to loop through the `layer_pattern` during a single forward pass. When >1,
      creates logical layers without increasing parameters. `num_loops=2` with `num_layers=6` behaves
      like 12 layers but with 6-layer parameters. Increases training time linearly.

      **Impact:** Increases compute cost without increasing parameter memory. Ideal for compensating
      models with few physical layers. Doesn't improve representation capacity as much as additional physical layers
      (weights are shared across loop iterations by position).
    description_es: |
      Número de veces que se recorre `layer_pattern` en una pasada hacia adelante. Cuando >1,
      crea capas lógicas sin aumentar parámetros. `num_loops=2` con `num_layers=6` se comporta como
      12 capas pero con parámetros de 6. Aumenta el tiempo de entrenamiento linealmente.

      **Impacto:** Aumenta el costo de cómputo sin aumentar memoria de parámetros. Ideal para compensar
      models with few physical layers. Doesn't improve representation capacity as much as additional physical layers
      (weights are shared across loop iterations by position).
    examples: [1, 2]
  num_heads:
    type: integer
    title: "Attention Heads"
    title_es: "Cabezas de Atención"
    description: |
      Number of parallel attention heads. Must divide `hidden_size` evenly. Typical: 8 (small),
      12 (BERT-base), 16 (BERT-large), 32 (large). Each head learns different attention patterns.

      **Impact:** Per-head dimension = `hidden_size / num_heads`. Values <64 per head can degrade
      quality. Too many heads with small dimensions fragment the representation. Rule of thumb:
      keep per-head dimension between 64 and 128. With `hidden_size=768`, `num_heads=12` gives 64/head.
    description_es: |
      Número de cabezas de atención paralelas. Debe dividir `hidden_size` exactamente. Típico:
      8 (pequeño), 12 (BERT-base), 16 (BERT-large), 32 (grande). Cada cabeza aprende patrones de atención distintos.

      **Impacto:** Per-head dimension = `hidden_size / num_heads`. Valores <64 por cabeza pueden degradar
      quality. Too many heads with small dimensions fragment the representation. Rule of thumb:
      keep per-head dimension between 64 and 128. With `hidden_size=768`, `num_heads=12` gives 64/head.
    examples: [12]
  num_kv_heads:
    type: integer
    title: "Key-Value Heads (GQA)"
    title_es: "Cabezas Clave-Valor (GQA)"
    description: |
      Number of key-value heads for Grouped-Query Attention (``gqa_attn``).
      Must divide ``num_heads`` evenly. Values range from 1 (equivalent to
      multi-query attention) to ``num_heads`` (equivalent to multi-head
      attention). The paper suggests 8 as a favorable middle ground for
      typical model sizes.
    description_es: |
      Número de cabezas clave-valor para Grouped-Query Attention
      (``gqa_attn``). Debe dividir ``num_heads`` exactamente. Los valores
      van de 1 (equivalente a multi-query attention) a ``num_heads``
      (equivalente a multi-head attention). El paper sugiere 8 como un
      punto medio favorable para tamaños de modelo típicos.
    examples: [1, 8]
  retention_heads:
    type: integer
    title: "Retention Heads"
    title_es: "Cabezas de Retención"
    description: |
      Number of heads for RetentionNet/RetNet layers. Similar to `num_heads` but governs
      retention mechanisms that blend RNN and transformer properties. Must divide `hidden_size` evenly.

      **Impact:** Only affects `retnet`/`retnet_attn` layers in `layer_pattern`. Generally set equal
      to `num_heads` for simplicity. More heads enable diverse retention contexts but
      reduce per-head capacity.
    description_es: |
      Número de cabezas para capas RetentionNet/RetNet. Similar a `num_heads` pero gobierna
      mecanismos de retención que combinan propiedades de RNN y transformer. Debe dividir `hidden_size` exactamente.

      **Impacto:** Solo afecta capas `retnet`/`retnet_attn` en `layer_pattern`. Generalmente se iguala
      to `num_heads` for simplicity. More heads enable diverse retention contexts but
      reduce per-head capacity.
    examples: [12]
  num_experts:
    type: integer
    title: "MoE Expert Count"
    title_es: "Número de Expertos MoE"
    description: |
      Total number of expert networks in the MoE layer. Each expert is a separate FFN.
      Router selects `top_k_experts` to activate per token. Typical: 4–8 (efficient), up to 64 (scaling).
      Requires `use_moe=true`.

      **Impact:** Increases model capacity without proportionally increasing compute (only
      `top_k` active per token). Inactive experts don't consume FLOPs but do occupy memory.
      Balanced load across experts is critical; poorly trained routers collapse into few experts.
    description_es: |
      Número total de redes expertas en la capa MoE. Cada experto es una FFN separada.
      El router selecciona `top_k_experts` para activar por token. Típico: 4–8 (eficiente), hasta 64 (escalado).
      Requiere `use_moe=true`.

      **Impacto:** Aumenta la capacidad del modelo sin aumentar el cómputo proporcionalmente (solo
      `top_k` active per token). Inactive experts don't consume FLOPs but do occupy memory.
      Balanced load across experts is critical; poorly trained routers collapse into few experts.
    examples: [4]
  top_k_experts:
    type: integer
    title: "Top-K Expert Selection"
    title_es: "Selección Top-K de Expertos"
    description: |
      Number of experts activated per token. Router selects the top-k most relevant from
      `num_experts`. Typical: 1–2. k=1 maximizes sparsity (only 1/num_experts active). Must be ≤ `num_experts`.

      **Impact:** k=1 maximizes efficiency and expert specialization. k=2+ gives more capacity but
      reduces sparsity and can dilute specialization. With k=1 and 8 experts, each token only
      passes through 1/8 of FFN parameters.
    description_es: |
      Número de expertos activados por token. El router selecciona los top-k más relevantes
      de `num_experts`. Típico: 1–2. k=1 maximiza la dispersión (solo 1/num_experts activo). Debe ser ≤ `num_experts`.

      **Impacto:** k=1 maximiza eficiencia y especialización de expertos. k=2+ da más capacidad pero
      reduces sparsity and can dilute specialization. With k=1 and 8 experts, each token only
      passes through 1/8 of FFN parameters.
    examples: [2]
  dropout:
    type: integer
    title: "Dropout Probability"
    title_es: "Probabilidad de Dropout"
    description: |-
      Global dropout rate applied throughout the model (attention, FFN, embeddings). Typical:
      0.1 (BERT), 0.3 (small datasets). Higher = more regularization, lower = less. Tune based on
      overfitting: increase if validation loss >> train loss.

      **Examples explained:**
      - `0.1`: BERT standard. Good default for mid-size models and datasets (>1M samples). Provides moderate regularization without slowing convergence too much.
      - `0.05`: Light regularization. For very large datasets (>100M tokens) or large models where overfitting is less of a concern. Faster convergence.
      - `0.2–0.3`: Strong regularization. For small datasets (<10M tokens) where overfitting is likely. Slows training but improves generalization.
      - `0.0`: No dropout. Only for debugging or when using other regularization (weight decay, data augmentation). Models typically overfit without it.
      - Overfitting diagnosis: If train loss keeps decreasing while validation loss plateaus or increases, raise dropout by 0.05–0.1. If both losses are flat (underfitting), lower dropout.
    description_es: |-
      Tasa global de dropout aplicada en todo el modelo (atención, FFN, embeddings). Típico:
      0.1 (BERT), 0.3 (datasets pequeños). Mayor = más regularización, menor = menos. Ajustar según
      sobreajuste: aumentar si pérdida de validación >> pérdida de entrenamiento.

      **Ejemplos explicados:**
      - `0.1`: Estándar BERT. Buen valor por defecto para modelos de tamaño medio y datasets (>1M muestras). Proporciona regularización moderada sin ralentizar demasiado la convergencia.
      - `0.05`: Regularización ligera. Para datasets muy grandes (>100M tokens) o modelos grandes donde el sobreajuste preocupa menos. Convergencia más rápida.
      - `0.2–0.3`: Regularización fuerte. Para datasets pequeños (<10M tokens) donde el sobreajuste es probable. Ralentiza el entrenamiento pero mejora la generalización.
      - `0.0`: Sin dropout. Solo para debugging o cuando se usan otros regularizadores (weight decay, data augmentation). Los modelos típicamente sobreajustan sin él.
      - Diagnóstico de sobreajuste: Si la pérdida de entrenamiento sigue bajando mientras la de validación se estanca o sube, aumentar dropout en 0.05–0.1. Si ambas pérdidas están planas (subajuste), bajar dropout.
    examples: [0.1]
  layer_pattern:
    type: array
    title: "Layer Pattern"
    title_es: "Patrón de Capas"
    description: |-
      Ordered sequence of layer types stacked in the model. Each element defines one
      physical layer. Pattern length must equal `num_layers`. Available types:

      | Type | Description | Training | Inference |
      |------|-------------|----------|-----------|
      | `standard_attn` | Classic multi-head self-attention (like BERT) | ✅ | ✅ |
      | `sigmoid_attn` | Sigmoid-gated attention | ✅ | ✅ |
      | `gated_softmax_attn` | Gated softmax attention with post-SDPA sigmoid | ✅ | ✅ |
      | `titan_attn` | Titan attention with positional encoding (`hope`/`rope`) | ✅ | ✅ |
      | `retnet` / `retnet_attn` | Retention Network (RNN+transformer hybrid) | ✅ | ✅ |
      | `mamba` | Selective state-space model (SSM) | ✅ | ✅ |
      | `ode` | Continuous-depth ODE layer (uses `ode_solver`/`ode_steps`) | ✅ | ✅ |
      | `gla_attn` | Gated Linear Attention with multiplicative decay | ✅ | ✅ |
      | `deltanet_attn` / `gated_deltanet_attn` | DeltaNet with corrective delta rule | ✅ | ✅ |
      | `gated_deltanet2_attn` | Gated DeltaNet-2 with decoupled channel-wise erase/write gates (arXiv:2605.22791) | ✅ | ✅ |
      | `hgrn2_attn` | HGRN2 with hierarchical forget gates | ✅ | ✅ |
      | `fox_attn` | Forgetting Transformer (FoX) with forget bias in logits | ✅ | ✅ |
      | `nsa_attn` | Native Sparse Attention (three-branch) | ✅ | ✅ |
      | `engram_attn` | N-gram conditional memory lookup (arXiv:2601.07372) | ✅ | ✅ |
      | `gqa_attn` | Grouped-Query Attention — configurable KV heads (arXiv:2305.13245) | ✅ | ✅ |
      | `longformer_attn` | Longformer: sliding windows + global tokens | ✅ | ✅ |
      | `bigbird_attn` | BigBird: local + random + global attention | ✅ | ✅ |
      | `sparse_transformer_attn` | Sparse Transformer: factorized patterns | ✅ | ✅ |
      | `sparsek_attn` | SparseK: differentiable top-k KV selection | ✅ | ✅ |
      | `sparge_attn` ⚠️ | SpargeAttn — **eval-only**, two-stage block pruning | ❌ | ✅ |
      | `fasa_attn` ⚠️ | FASA — **eval-only**, frequency-aware token selection | ❌ | ✅ |
      | `msa_attn` | MiniMax Sparse Attention — block-sparse on GQA (arXiv:2606.13392) | ✅ | ✅ |
      | `sparda_attn` | SparDA — decoupled sparse attention with a Forecast projection (arXiv:2606.04511) | ✅ | ✅ |
      | `kda_attn` | Kimi Delta Attention — channel-wise decay + scalar write gate (arXiv:2510.26692) | ✅ | ✅ |
      | `mla_attn` | Multi-Head Latent Attention + RoPE (arXiv:2506.09342) | ✅ | ✅ |
      | `gqla_attn` | Group-Query Latent Attention — two decoding paths (arXiv:2605.15250) | ✅ | ✅ |
      | `mlra_attn` | Multi-Head Low-Rank Attention — partitionable latent (arXiv:2603.02188) | ✅ | ✅ |
      | `tucker_attn` | Tucker Attention — generalised low-rank factorisation (arXiv:2603.30033) | ✅ | ✅ |
      | `iha_attn` | Interleaved Head Attention — cross-head pseudo-heads (arXiv:2602.21371) | ✅ | ✅ |
      | `gta_attn` | Grouped-head laTenT Attention — shared map + latent values (arXiv:2506.17286) | ✅ | ✅ |
      | `mtla_attn` | Multi-head Temporal Latent Attention — temporal KV merge (arXiv:2505.13544) | ✅ | ✅ |

      **Examples explained:**
      - `[standard_attn]` repeated 12 times: Classic BERT-like encoder. Simplest configuration, serves as a reliable baseline. All layers use full quadratic attention.
      - `[retnet, titan_attn, retnet, mamba, titan_attn, ode]` with `num_layers=6`: Mixed architecture combining recurrent retention (efficient long-range), Titan attention with positional encoding (precise local attention), Mamba SSM (linear-time sequence modeling), and ODE continuous depth. Each position gets a different type of computation, enabling diverse representations.
      - `[standard_attn, standard_attn, longformer_attn]` with `num_layers=3`: Hybrid dense + sparse. Start with 2 dense attention layers for fine-grained interactions, then use Longformer for efficient long-sequence processing. Good for documents > 512 tokens.
      - Mixing recurrent (retnet, mamba) with attention (standard_attn, titan_attn): Recurrent layers provide memory and long-range context at O(1) inference cost, while attention layers provide high-precision local interactions. This is the recommended pattern for models that need both efficiency and quality.
    description_es: |-
      Secuencia ordenada de tipos de capa apilados en el modelo. Cada elemento define una
      capa física. La longitud del patrón debe igualar `num_layers`. Tipos disponibles:

      | Tipo | Descripción | Entrenamiento | Inferencia |
      |------|-------------|---------------|------------|
      | `standard_attn` | Atención multi-cabeza clásica (tipo BERT) | ✅ | ✅ |
      | `sigmoid_attn` | Atención con compuerta sigmoide | ✅ | ✅ |
      | `gated_softmax_attn` | Atención softmax con compuerta post-SDPA | ✅ | ✅ |
      | `titan_attn` | Atención Titan con codificación posicional (`hope`/`rope`) | ✅ | ✅ |
      | `retnet` / `retnet_attn` | Retention Network (híbrido RNN+transformer) | ✅ | ✅ |
      | `mamba` | Modelo de espacio de estados (SSM) selectivo | ✅ | ✅ |
      | `ode` | Capa ODE de profundidad continua (usa `ode_solver`/`ode_steps`) | ✅ | ✅ |
      | `gla_attn` | Gated Linear Attention con decaimiento multiplicativo | ✅ | ✅ |
      | `deltanet_attn` / `gated_deltanet_attn` | DeltaNet con regla delta correctiva | ✅ | ✅ |
      | `gated_deltanet2_attn` | Gated DeltaNet-2 con compuertas erase/write canalizadas decoupladas (arXiv:2605.22791) | ✅ | ✅ |
      | `hgrn2_attn` | HGRN2 con compuertas de olvido jerárquicas | ✅ | ✅ |
      | `fox_attn` | Forgetting Transformer (FoX) con sesgo de olvido en logits | ✅ | ✅ |
      | `nsa_attn` | Native Sparse Attention de tres ramas | ✅ | ✅ |
      | `engram_attn` | Memoria condicional por N-gramas (arXiv:2601.07372) | ✅ | ✅ |
      | `gqa_attn` | Grouped-Query Attention — cabezas KV configurables (arXiv:2305.13245) | ✅ | ✅ |
      | `longformer_attn` | Longformer: ventanas deslizantes + tokens globales | ✅ | ✅ |
      | `bigbird_attn` | BigBird: local + aleatorio + global | ✅ | ✅ |
      | `sparse_transformer_attn` | Sparse Transformer: patrones factorizados | ✅ | ✅ |
      | `sparsek_attn` | SparseK: selección top-k diferenciable | ✅ | ✅ |
      | `sparge_attn` ⚠️ | SpargeAttn — **solo evaluación** | ❌ | ✅ |
      | `fasa_attn` ⚠️ | FASA — **solo evaluación** | ❌ | ✅ |
      | `msa_attn` | MiniMax Sparse Attention — bloques dispersos sobre GQA (arXiv:2606.13392) | ✅ | ✅ |
      | `sparda_attn` | SparDA — atención dispersa desacoplada con proyección Forecast (arXiv:2606.04511) | ✅ | ✅ |
      | `kda_attn` | Kimi Delta Attention — decaimiento canalizado + compuerta escalar (arXiv:2510.26692) | ✅ | ✅ |
      | `mla_attn` | Multi-Head Latent Attention + RoPE (arXiv:2506.09342) | ✅ | ✅ |
      | `gqla_attn` | Group-Query Latent Attention — dos rutas de decodificación (arXiv:2605.15250) | ✅ | ✅ |
      | `mlra_attn` | Multi-Head Low-Rank Attention — latente particionable (arXiv:2603.02188) | ✅ | ✅ |
      | `tucker_attn` | Tucker Attention — factorización de bajo rango generalizada (arXiv:2603.30033) | ✅ | ✅ |
      | `iha_attn` | Interleaved Head Attention — pseudo-cabezas entre cabezas (arXiv:2602.21371) | ✅ | ✅ |
      | `gta_attn` | Grouped-head laTenT Attention — mapa compartido + valores latentes (arXiv:2506.17286) | ✅ | ✅ |
      | `mtla_attn` | Multi-head Temporal Latent Attention — fusión temporal de KV (arXiv:2505.13544) | ✅ | ✅ |
      **Ejemplos explicados:**
      - `[standard_attn]` repetido 12 veces: Encoder clásico tipo BERT. Configuración más simple, sirve como línea base confiable. Todas las capas usan atención cuadrática completa.
      - `[retnet, titan_attn, retnet, mamba, titan_attn, ode]` con `num_layers=6`: Arquitectura mixta que combina retención recurrente (largo alcance eficiente), atención Titan con codificación posicional (atención local precisa), Mamba SSM (modelado de secuencias en tiempo lineal) y ODE de profundidad continua. Cada posición recibe un tipo diferente de cómputo, permitiendo representaciones diversas.
      - `[standard_attn, standard_attn, longformer_attn]` con `num_layers=3`: Híbrido denso + disperso. Empieza con 2 capas de atención densa para interacciones detalladas, luego usa Longformer para procesamiento eficiente de secuencias largas. Bueno para documentos > 512 tokens.
      - Mezcla de recurrente (retnet, mamba) con atención (standard_attn, titan_attn): Las capas recurrentes proporcionan memoria y contexto de largo alcance a costo O(1) en inferencia, mientras que las capas de atención proporcionan interacciones locales de alta precisión. Este es el patrón recomendado para modelos que necesitan tanto eficiencia como calidad.
      - ⚠️ `sparge_attn` y `fasa_attn` son bloques **solo de evaluación** — lanzan error en tiempo de ejecución si se usan durante entrenamiento. No incluirlos en el patrón para entrenamiento desde cero.
    items:
      type: string
      enum:
        - retnet
        - retnet_attn
        - mamba
        - ode
        - titan_attn
        - standard_attn
        - sigmoid_attn
        - sparse_transformer_attn
        - longformer_attn
        - bigbird_attn
        - sparsek_attn
        - nsa_attn
        - sparge_attn
        - fasa_attn
        - gla_attn
        - deltanet_attn
        - gated_deltanet_attn
        - gated_deltanet2_attn
        - hgrn2_attn
        - fox_attn
        - gated_softmax_attn
        - engram_attn
        - gqa_attn
        - mla_attn
        - gqla_attn
        - mlra_attn
        - tucker_attn
        - iha_attn
        - gta_attn
        - mtla_attn
        - msa_attn
        - sparda_attn
        - kda_attn
    examples:
      - [retnet, titan_attn, retnet, mamba, titan_attn, ode]
      - [standard_attn]
  ode_solver:
    type: string
    title: "ODE Solver"
    title_es: "Solucionador ODE"
    description: |
      Numerical integration method for ODE layers. Only applies when `ode` appears in `layer_pattern`.
      - `rk4`: Runge-Kutta 4th order — higher accuracy and stability, but 4× slower than `euler`.
      - `euler`: Euler method — faster but may require smaller `ode_steps` or careful tuning.

      **Impact:** Use `rk4` for quality-critical tasks or if there's instability. Use `euler` for
      rapid prototyping or when extra precision doesn't justify the computational cost.
    description_es: |
      Método de integración numérica para capas ODE. Solo aplica cuando `ode` aparece en `layer_pattern`.
      - `rk4`: Runge-Kutta orden 4 — mayor precisión y estabilidad, pero 4× más lento que `euler`.
      - `euler`: Método de Euler — más rápido pero puede requerir `ode_steps` más pequeños o ajuste cuidadoso.

      **Impacto:** Usar `rk4` para tareas críticas de calidad o si hay inestabilidad. Usar `euler` para
      rapid prototyping or when extra precision doesn't justify the computational cost.
    enum: [rk4, euler]
    examples: [rk4]
  ode_steps:
    type: integer
    title: "ODE Integration Steps"
    title_es: "Pasos de Integración ODE"
    description: |
      Number of integration steps for ODE layers between consecutive transformer layers.
      Typical: 2–4. More steps = more accurate continuous dynamics approximation at linear compute cost.
      With `rk4` solver, fewer steps often suffice vs `euler`.

      **Impact:** Multiplies ODE layer cost by this factor. For long sequences, higher
      values (4–8) can improve quality. For efficiency, start with 2 and increase if needed.
    description_es: |
      Número de pasos de integración para capas ODE entre capas consecutivas del transformer.
      Típico: 2–4. Más pasos = aproximación más precisa de dinámicas continuas con costo lineal.
      Con solver `rk4`, menos pasos suelen ser suficientes vs `euler`.

      **Impacto:** Multiplica el costo de la capa ODE por este factor. Para secuencias largas, valores
      values (4–8) can improve quality. For efficiency, start with 2 and increase if needed.
    examples: [2]
  use_bitnet:
    type: boolean
    title: "Enable BitNet"
    title_es: "Habilitar BitNet"
    description: |
      Enable BitLinear (binary quantization) layers using -1/+1 weights instead of float32.
      Enables significant compression and speedup. **Experimental** — may affect model quality.
      Best suited for inference deployment. Requires careful LR tuning (gradients flow through binary weights).

      **Impact:** Reduces memory ~32× for quantized weights but can significantly degrade quality.
      Not recommended as an initial configuration; try first without BitNet and enable only for
      inference optimization.
    description_es: |
      Habilita capas BitLinear (cuantización binaria) usando pesos -1/+1 en lugar de float32.
      Permite compresión y aceleración significativas. **Experimental** — puede afectar calidad.
      Ideal para despliegue de inferencia. Requiere ajuste cuidadoso del learning rate.

      **Impacto:** Reduce memoria ~32× para pesos cuantizados pero puede degradar calidad significativamente.
      Not recommended as an initial configuration; try first without BitNet and enable only for
      inference optimization.
    examples: [false]
  norm_type:
    type: string
    title: "Normalization Type"
    title_es: "Tipo de Normalización"
    description: |-
      Normalization strategy used throughout the model.
      - `layer_norm`: Standard Layer Normalization — subtracts mean, divides by std. Stable, widely used. **Recommended.**
      - `dynamic_tanh`: Dynamic tanh normalization (DyT) — replaces explicit normalization with a learned bounded map: `tanh(α·x)`. Normalization-free, experimental.
      - `derf`: Dynamic erf normalization — extends DyT with erf function: `erf(α·x + s)`. Normalization-free, experimental, may improve over DyT.

      ⚠️ `rms_norm` is NOT a valid schema value.

      **Examples explained:**
      - `layer_norm`: Safest choice. Used in BERT, GPT, and most transformer architectures. Well-understood behavior, no tuning needed. Start here for new models.
      - `dynamic_tanh`: Experimental alternative. Removes per-token statistics computation. May converge faster in some settings but requires the model to learn α (initialized near 1.0). Useful for exploring normalization-free architectures.
      - `derf`: Most experimental option. Reported to outperform DyT in some benchmarks. Has learnable scale α and shift s. Use only if exploring cutting-edge normalization research and willing to tune additional parameters.
    description_es: |-
      Estrategia de normalización usada en todo el modelo.
      - `layer_norm`: Layer Normalization estándar — resta la media, divide por la desviación estándar. Estable, ampliamente usada. **Recomendada.**
      - `dynamic_tanh`: Normalización tanh dinámica (DyT) — reemplaza la normalización explícita con un mapa acotado aprendido: `tanh(α·x)`. Libre de normalización, experimental.
      - `derf`: Normalización erf dinámica — extiende DyT con función erf: `erf(α·x + s)`. Libre de normalización, experimental, puede mejorar sobre DyT.

      ⚠️ `rms_norm` NO es un valor válido en el esquema.

      **Ejemplos explicados:**
      - `layer_norm`: Opción más segura. Usada en BERT, GPT y la mayoría de arquitecturas transformer. Comportamiento bien comprendido, no requiere ajuste. Empezar aquí para nuevos modelos.
      - `dynamic_tanh`: Alternativa experimental. Elimina el cómputo de estadísticas por token. Puede converger más rápido en algunos contextos pero requiere que el modelo aprenda α (inicializado cerca de 1.0). Útil para explorar arquitecturas libres de normalización.
      - `derf`: Opción más experimental. Reportado como superior a DyT en algunos benchmarks. Tiene escala α y desplazamiento s aprendibles. Usar solo si se exploran investigaciones de normalización de vanguardia y se está dispuesto a ajustar parámetros adicionales.
    enum: [layer_norm, dynamic_tanh, derf]
    examples: [layer_norm]
  use_factorized_embedding:
    type: boolean
    title: "Factorized Embeddings"
    title_es: "Embeddings Factorizados"
    description: |-
      Enable embedding matrix factorization to reduce parameters. Instead of full
      `(vocab_size × hidden_size)`, uses two smaller matrices. Reduces from O(V×H) to O(V×R + R×H)
      where R = `factorized_embedding_dim`. **Recommended when `vocab_size × hidden_size > 100M`.**

      **Examples explained:**
      - `false`: Standard embedding. vocab_size=50000, hidden_size=768 → 38.4M embedding params. Simple, no quality tradeoff. Best when embedding params are a small fraction of total model size.
      - `true` with `factorized_embedding_dim=128`: vocab_size=50000, hidden_size=768 → (50000×128) + (128×768) = ~6.5M params. 5.9× reduction. Quality impact is usually negligible for large vocabularies (>10k tokens).
      - `true` with `factorized_embedding_dim=64`: More aggressive compression. ~3.3M params but may start to lose fine-grained token distinctions. Best for models where total parameter budget is tight.
      - `true` with `factorized_embedding_dim=256`: Conservative compression. ~13.1M params. If model quality is the priority but some savings are desired. Close to full embedding quality.
      - Decision rule: If `vocab_size × hidden_size` exceeds 20% of your parameter budget, consider factorized embeddings. Use `factorized_embedding_dim ≈ sqrt(vocab_size)` or `hidden_size/6` as starting point.
    description_es: |-
      Habilita factorización de matriz de embedding para reducir parámetros. En lugar de
      `(vocab_size × hidden_size)` completo, usa dos matrices más pequeñas. Reduce de O(V×H) a
      O(V×R + R×H) donde R = `factorized_embedding_dim`. **Recomendado cuando `vocab_size × hidden_size > 100M`.**

      **Ejemplos explicados:**
      - `false`: Embedding estándar. vocab_size=50000, hidden_size=768 → 38.4M params de embedding. Simple, sin compromiso de calidad. Mejor cuando los params de embedding son una fracción pequeña del tamaño total del modelo.
      - `true` con `factorized_embedding_dim=128`: vocab_size=50000, hidden_size=768 → (50000×128) + (128×768) = ~6.5M params. Reducción 5.9×. El impacto en calidad suele ser insignificante para vocabularios grandes (>10k tokens).
      - `true` con `factorized_embedding_dim=64`: Compresión más agresiva. ~3.3M params pero puede empezar a perder distinciones finas entre tokens. Mejor para modelos donde el presupuesto total de parámetros es ajustado.
      - `true` con `factorized_embedding_dim=256`: Compresión conservadora. ~13.1M params. Si la calidad del modelo es prioridad pero se desean algunos ahorros. Cercano a la calidad de embedding completo.
      - Regla de decisión: Si `vocab_size × hidden_size` excede el 20% de tu presupuesto de parámetros, considerar embeddings factorizados. Usar `factorized_embedding_dim ≈ sqrt(vocab_size)` o `hidden_size/6` como punto de partida.
    examples: [false]
  factorized_embedding_dim:
    type: integer
    title: "Factorized Embedding Dim"
    title_es: "Dim de Embedding Factorizado"
    description: |
      Intermediate dimension for factorized embeddings (only when `use_factorized_embedding=true`).
      Typical: 64–256. Rule of thumb: `factorized_embedding_dim ≈ sqrt(vocab_size)` or `hidden_size/6`.

      **Impact:** Lower = more compression but possible quality loss. <32 degrades quality;
      >512 reduces compression benefits. For vocab=50k and hidden=768: try 128–224.
    description_es: |
      Dimensión intermedia para embeddings factorizados (solo cuando `use_factorized_embedding=true`).
      Típico: 64–256. Regla general: `factorized_embedding_dim ≈ sqrt(vocab_size)` o `hidden_size/6`.

      **Impacto:** Menor = más compresión pero posible pérdida de calidad. <32 degrada calidad;
      >512 reduces compression benefits. For vocab=50k and hidden=768: try 128–224.
    examples: [128]
  use_embedding_conv:
    type: boolean
    title: "Embedding Convolution"
    title_es: "Convolución de Embeddings"
    description: |
      Apply 1D convolution over token embeddings to capture local n-gram patterns
      before the transformer. Experimental — may help with code or n-gram-heavy languages.

      **Impact:** Adds `hidden_size × embedding_conv_kernel` parameters. Little gain for
      languages where global context is more important than local patterns. Try with kernel=3.
    description_es: |
      Aplica convolución 1D sobre embeddings de tokens para capturar patrones locales
      de n-gramas antes del transformer. Experimental — puede ayudar con código o idiomas
      con fuerte estructura de n-gramas.

      **Impacto:** Agrega `hidden_size × embedding_conv_kernel` parámetros. Poca ganancia para
      languages where global context is more important than local patterns. Try with kernel=3.
    examples: [false]
  embedding_conv_kernel:
    type: integer
    title: "Embedding Conv Kernel"
    title_es: "Kernel de Conv de Embeddings"
    description: |
      Kernel size for embedding Conv1d when `use_embedding_conv=true`. Typical: 3 (trigram), 5, 7.
      Larger = wider local context but more params (`kernel_size × hidden_size`).

      **Impact:** Kernel=3 is the safe starting point. Values >15 negate the benefit of
      the transformer's global attention. Only applies if `use_embedding_conv=true`.
    description_es: |
      Tamaño de kernel para Conv1d de embeddings cuando `use_embedding_conv=true`. Típico: 3 (trigrama), 5, 7.
      Mayor = contexto local más amplio pero más parámetros (`kernel_size × hidden_size`).

      **Impacto:** Kernel=3 es el punto de partida seguro. Valores >15 anulan el beneficio de la
      the transformer's global attention. Only applies if `use_embedding_conv=true`.
    examples: [3]
  positional_encoding:
    type: string
    title: "Titan Positional Encoding"
    title_es: "Codificación Posicional Titan"
    description: |-
      Positional encoding method for `titan_attn` layers. Provides position information to attention heads.
      - `hope`: Higher-Order Position Encoding — analytic formulation with tunable base frequency (`hope_base`) and damping (`hope_damping`) for controlling long-range vs. local attention behavior.
      - `rope`: Rotary Position Embedding — standard in Llama, GPT-3.5, Mistral. Better long-range generalization via `rope_base` and `rope_scaling`. RoPE applies rotation to query and key vectors based on token position, encoding relative positions in the dot product.

      **Examples explained:**
      - `hope` with `hope_base=10000.0, hope_damping=0.01`: Standard HoPE config. Strong damping (0.01) gives local focus — good for tasks where nearby tokens matter most (NER, code completion). Increase base for longer documents.
      - `hope` with `hope_base=100000.0, hope_damping=0.5`: Long-range HoPE config. High base extends wavelength for distant position discrimination, mild damping maintains sensitivity to far-away tokens. Good for document QA, reasoning tasks.
      - `rope` with `rope_base=10000.0, rope_scaling=1.0`: Standard RoPE (like Llama). Works well for most sequence lengths. If training on sequences up to 512, this handles them naturally.
      - `rope` with `rope_base=100000.0, rope_scaling=4.0`: Extended context RoPE. Train on 512-token sequences, infer on up to 2048 tokens. Higher base + scaling factor enables context window extrapolation without retraining on full-length sequences.
    description_es: |-
      Método de codificación posicional para capas `titan_attn`. Proporciona información de posición a las cabezas de atención.
      - `hope`: Higher-Order Position Encoding — formulación analítica con frecuencia base ajustable (`hope_base`) y amortiguación (`hope_damping`) para controlar comportamiento de atención de largo alcance vs. local.
      - `rope`: Rotary Position Embedding — estándar en Llama, GPT-3.5, Mistral. Mejor generalización de largo alcance mediante `rope_base` y `rope_scaling`. RoPE aplica rotación a vectores query y key basada en la posición del token, codificando posiciones relativas en el producto punto.

      **Ejemplos explicados:**
      - `hope` con `hope_base=10000.0, hope_damping=0.01`: Configuración HoPE estándar. Amortiguación fuerte (0.01) da enfoque local — bueno para tareas donde los tokens cercanos importan más (NER, completado de código). Aumentar base para documentos más largos.
      - `hope` con `hope_base=100000.0, hope_damping=0.5`: Configuración HoPE de largo alcance. Base alta extiende longitud de onda para discriminación de posiciones distantes, amortiguación suave mantiene sensibilidad a tokens lejanos. Bueno para QA de documentos, tareas de razonamiento.
      - `rope` con `rope_base=10000.0, rope_scaling=1.0`: RoPE estándar (como Llama). Funciona bien para la mayoría de longitudes de secuencia. Entrenando en secuencias de hasta 512 tokens, las maneja naturalmente.
      - `rope` con `rope_base=100000.0, rope_scaling=4.0`: RoPE de contexto extendido. Entrena en secuencias de 512 tokens, infiere en hasta 2048 tokens. Base más alta + factor de escalado permite extrapolación de ventana de contexto sin reentrenar en secuencias de longitud completa.
    enum: [hope, rope]
    examples: [hope, rope]
  hope_base:
    type: number
    title: "HoPE Base"
    title_es: "Base de HoPE"
    description: |
      Base frequency scale for HoPE positional encoding. Controls wavelength of positional
      sin/cos functions. Typical: 10000 (standard), 100000 (very long-range), 1000 (short-range).
      Only when `positional_encoding=hope`.

      **Impact:** Higher values = longer-range positional sensitivity. Useful for long
      documents. Too high can cause positional confusion; too low limits discrimination.
    description_es: |
      Escala de frecuencia base para codificación posicional HoPE. Controla la longitud de
      onda de funciones sin/cos posicionales. Típico: 10000 (estándar), 100000 (alcance muy largo),
      1000 (alcance corto). Solo cuando `positional_encoding=hope`.

      **Impacto:** Valores más altos = sensibilidad posicional de más largo alcance. Útil para documentos
      documents. Too high can cause positional confusion; too low limits discrimination.
    examples: [10000.0]
  hope_damping:
    type: number
    title: "HoPE Damping"
    title_es: "Amortiguación HoPE"
    description: |
      Damping coefficient for HoPE to control attention decay over distance. Range 0–1+.
      Typical: 0.01 (strong damping, local focus), 0.1 (moderate), 1.0 (no damping).
      Only when `positional_encoding=hope`.

      **Impact:** Local tasks (NER, code) benefit from low values (<0.1). Long-range
      tasks (QA, reasoning) benefit from high values (>0.5).
    description_es: |
      Coeficiente de amortiguación para HoPE que controla decaimiento de atención con la
      distancia. Rango 0–1+. Típico: 0.01 (amortiguación fuerte, enfoque local), 0.1 (moderado),
      1.0 (sin amortiguación). Solo cuando `positional_encoding=hope`.

      **Impacto:** Tareas locales (NER, código) se benefician de valores bajos (<0.1). Tareas de
      tasks (QA, reasoning) benefit from high values (>0.5).
    examples: [0.01]
  rope_base:
    type: number
    title: "RoPE Base"
    title_es: "Base de RoPE"
    description: |
      Base frequency for RoPE positional encoding. Standard: 10000 (Llama). Extended: 100000–1000000
      for longer contexts (100k+ tokens). Only when `positional_encoding=rope`.

      **Impact:** Combine with `rope_scaling` for context window extrapolation.
      Training on short sequences and inferring on long ones requires increasing `rope_base`.
    description_es: |
      Frecuencia base para codificación posicional RoPE. Estándar: 10000 (Llama).
      Extendido: 100000–1000000 para contextos más largos (100k+ tokens). Solo cuando `positional_encoding=rope`.

      **Impacto:** Combinar con `rope_scaling` para extrapolación de ventana de contexto.
      Training on short sequences and inferring on long ones requires increasing `rope_base`.
    examples: [10000.0]
  rope_scaling:
    type: number
    title: "RoPE Scaling"
    title_es: "Escalado RoPE"
    description: |
      Multiplier for RoPE position indices to enable longer context windows.
      Train on sequence length L while generalizing to L × `rope_scaling` at inference.
      Typical: 1.0 (no scaling), 2–8 (moderate), 16+ (aggressive). Only when `positional_encoding=rope`.

      **Impact:** Scaling >8× can degrade quality. Combine with increasing `rope_base`.
      Ideal when compute-limited for training on short sequences but long context is needed.
    description_es: |
      Multiplicador para índices de posición RoPE que permite ventanas de contexto más largas.
      Entrena en longitud L generalizando a L × `rope_scaling` en inferencia.
      Típico: 1.0 (sin escalado), 2–8 (moderado), 16+ (agresivo). Solo cuando `positional_encoding=rope`.

      **Impacto:** Escalado >8× puede degradar calidad. Combinar con aumento de `rope_base`.
      Ideal when compute-limited for training on short sequences but long context is needed.
    examples: [1.0]
  use_hope:
    type: boolean
    title: "Legacy HoPE Flag"
    title_es: "Flag Legado de HoPE"
    description: |
      **Deprecated.** Legacy fallback for backward compatibility. When `positional_encoding` is not
      set and `use_hope=true`, `titan_attn` layers use HoPE. Prefer setting `positional_encoding` explicitly.
      Will be removed in future versions.

      **Impact:** Do not use in new configurations. Use `positional_encoding: hope` or `positional_encoding: rope`.
    description_es: |
      **Obsoleto.** Fallback legado para compatibilidad hacia atrás. Cuando `positional_encoding`
      no está configurado y `use_hope=true`, las capas `titan_attn` usan HoPE. Preferir configurar
      `positional_encoding` explícitamente. Se eliminará en versiones futuras.

      **Impacto:** No usar en configuraciones nuevas. Usar `positional_encoding: hope` o `positional_encoding: rope`.
    examples: [true]
  use_moe:
    type: boolean
    title: "Enable MoE"
    title_es: "Habilitar Mixture of Experts"
    description: |-
      Enable Mixture of Experts in FFN layers. Replaces standard FFN with a router selecting
      `top_k_experts` from `num_experts` specialized sub-networks. Scales model capacity without
      proportional compute increase (only `top_k` active per token). Requires `num_experts` and `top_k_experts`.

      **Examples explained:**
      - `false`: Standard FFN. Every token passes through the same feed-forward network. Simple, predictable, no routing overhead. Good default for models < 100M params.
      - `true` with `num_experts=4, top_k_experts=1`: Each token routed to 1 of 4 FFN experts. 4× total FFN capacity for ~1× compute (plus routing overhead). Router learns to specialize experts on different token types (nouns, verbs, punctuation, etc.). Good starting point for MoE exploration.
      - `true` with `num_experts=8, top_k_experts=2`: More capacity, more compute. 2 experts active per token from 8 total. More expressive but harder to train — requires load balancing to prevent expert collapse (all tokens routing to 1-2 experts).
      - Load balancing tip: Start with smaller `num_experts` (4) and low `top_k` (1) to verify routing works. Increase only if the model benefits from additional capacity. Monitor expert utilization during training.
    description_es: |-
      Habilita Mixture of Experts en capas FFN. Reemplaza FFN estándar con un router que
      selecciona `top_k_experts` de `num_experts` sub-redes especializadas. Escala capacidad del modelo
      sin aumento proporcional de cómputo (solo `top_k` activos por token). Requiere `num_experts` y `top_k_experts`.

      **Ejemplos explicados:**
      - `false`: FFN estándar. Cada token pasa por la misma red feed-forward. Simple, predecible, sin overhead de ruteo. Buen valor por defecto para modelos < 100M params.
      - `true` con `num_experts=4, top_k_experts=1`: Cada token se enruta a 1 de 4 expertos FFN. 4× capacidad FFN total por ~1× cómputo (más overhead de ruteo). El router aprende a especializar expertos en diferentes tipos de token (sustantivos, verbos, puntuación, etc.). Buen punto de partida para exploración MoE.
      - `true` con `num_experts=8, top_k_experts=2`: Más capacidad, más cómputo. 2 expertos activos por token de 8 totales. Más expresivo pero más difícil de entrenar — requiere balanceo de carga para prevenir colapso de expertos (todos los tokens enrutándose a 1-2 expertos).
      - Consejo de balanceo de carga: Empezar con `num_experts` pequeño (4) y `top_k` bajo (1) para verificar que el ruteo funciona. Aumentar solo si el modelo se beneficia de capacidad adicional. Monitorear utilización de expertos durante el entrenamiento.
    examples: [true]
  use_mixture_of_depths:
    type: boolean
    title: "Enable Mixture of Depths"
    title_es: "Habilitar Mixture of Depths"
    description: |
      Enable Mixture-of-Depths token routing inside each transformer block. Each layer scores
      tokens with a lightweight router and only the top `capacity_ratio` subset is updated; skipped
      tokens pass through unchanged. Allocates more depth to salient tokens, reducing per-layer compute.

      **Impact:** Better with dense attention and FFN. Saves compute but can degrade quality if
      too many tokens are skipped. Set `mixture_of_depths_capacity_ratio` to control the balance.
    description_es: |
      Habilita ruteo de tokens Mixture-of-Depths dentro de cada bloque transformer. Cada capa
      puntúa tokens con un router ligero y solo el subconjunto `capacity_ratio` superior se actualiza;
      los tokens omitidos pasan sin cambios. Asigna más profundidad a tokens salientes, reduciendo cómputo por capa.

      **Impacto:** Mejor con atención densa y FFN. Ahorra cómputo pero puede degradar calidad si
      too many tokens are skipped. Set `mixture_of_depths_capacity_ratio` to control the balance.
    examples: [false]
  mixture_of_depths_capacity_ratio:
    type: number
    title: "MoD Capacity Ratio"
    title_es: "Ratio de Capacidad MoD"
    description: |
      Fraction of tokens each layer updates when `use_mixture_of_depths=true`.
      Effective capacity = `ceil(seq_len × ratio)`, min 1 token. Typical: 0.125–0.5 (aggressive),
      0.5–1.0 (conservative).

      **Impact:** Lower = more compute savings but higher risk of degradation. Start with 0.5
      and reduce gradually while monitoring quality.
    description_es: |
      Fracción de tokens que cada capa actualiza cuando `use_mixture_of_depths=true`.
      Capacidad efectiva = `ceil(seq_len × ratio)`, min 1 token. Típico: 0.125–0.5 (agresivo),
      0.5–1.0 (conservador).

      **Impacto:** Menor = más ahorro de cómputo pero más riesgo de degradación. Empezar con 0.5
      and reduce gradually while monitoring quality.
    exclusiveMinimum: 0
    maximum: 1
    examples: [0.5]
  mixture_of_depths_router_aux_loss_weight:
    type: number
    title: "MoD Router Aux Loss Weight"
    title_es: "Peso de Pérdida Auxiliar del Router MoD"
    description: |
      Weight for the auxiliary router regularizer in Mixture-of-Depths. Encourages the average
      router activation probability to match `mixture_of_depths_capacity_ratio`, stabilizing token
      selection during training. Set to 0 to disable.

      **Impact:** Typical values: 0.0 (no regularization) or 0.01–0.1. Helps prevent router
      collapse where all layers select the same tokens.
    description_es: |
      Peso para el regularizador auxiliar del router en Mixture-of-Depths. Incentiva que la
      probabilidad promedio de activación del router coincida con `mixture_of_depths_capacity_ratio`,
      estabilizando la selección de tokens durante el entrenamiento. 0 para deshabilitar.

      **Impacto:** Valores típicos: 0.0 (sin regularización) o 0.01–0.1. Ayuda a prevenir colapso
      collapse where all layers select the same tokens.
    minimum: 0
    examples: [0.0]
  ffn_hidden_size:
    type: integer
    title: "FFN Hidden Dimension"
    title_es: "Dimensión Oculta de FFN"
    description: |-
      Intermediate dimension of feed-forward layers. Typical ratio: 4× `hidden_size`
      (e.g., 768→3072 for BERT-base). When `use_moe=true`, this is each expert's hidden size.

      **Examples explained:**
      - `ffn_hidden_size=3072` with `hidden_size=768`: Standard 4× ratio. ~4.7M params per FFN layer (two projections). Good balance of capacity and memory for most tasks.
      - `ffn_hidden_size=2048` with `hidden_size=768`: Reduced 2.67× ratio. ~3.1M params per FFN layer. Saves ~35% FFN params vs. 4×. Good for memory-constrained models or when attention is the primary mechanism.
      - `ffn_hidden_size=4608` with `hidden_size=768`: Expanded 6× ratio. ~7.1M params per FFN layer. More FFN capacity for knowledge-intensive tasks. Higher memory, potentially better quality for language modeling.
      - With MoE (`use_moe=true`): Each expert uses this hidden size. With num_experts=4, FFN params multiply by 4 (stored, not all active). Choose smaller ratios (2–3×) with MoE to prevent parameter explosion.
    description_es: |-
      Dimensión intermedia de capas feed-forward. Ratio típico: 4× `hidden_size`
      (ej., 768→3072 para BERT-base). Cuando `use_moe=true`, es el tamaño oculto de cada experto.

      **Ejemplos explicados:**
      - `ffn_hidden_size=3072` con `hidden_size=768`: Ratio 4× estándar. ~4.7M params por capa FFN (dos proyecciones). Buen balance de capacidad y memoria para la mayoría de tareas.
      - `ffn_hidden_size=2048` con `hidden_size=768`: Ratio 2.67× reducido. ~3.1M params por capa FFN. Ahorra ~35% de params FFN vs. 4×. Bueno para modelos limitados en memoria o cuando la atención es el mecanismo principal.
      - `ffn_hidden_size=4608` con `hidden_size=768`: Ratio 6× expandido. ~7.1M params por capa FFN. Más capacidad FFN para tareas intensivas en conocimiento. Mayor memoria, potencialmente mejor calidad para modelado de lenguaje.
      - Con MoE (`use_moe=true`): Cada experto usa este tamaño oculto. Con num_experts=4, los params FFN se multiplican por 4 (almacenados, no todos activos). Elegir ratios más pequeños (2–3×) con MoE para prevenir explosión de parámetros.
    examples: [3072]
  ffn_activation:
    type: string
    title: "FFN Activation"
    title_es: "Activación de FFN"
    description: |
      Non-linear activation for feed-forward networks.
      - `silu`: Sigmoid Linear Unit — smoother, used in Llama/PaLM. **Recommended for new models.**
      - `gelu`: Gaussian Error Linear Unit — classic, used in BERT/GPT-2/GPT-3. More stable for very small models.

      **Impact:** The difference is subtle in practice. `silu` tends to converge faster.
      With BitNet or quantization, `silu` may be more robust.
    description_es: |
      Activación no lineal para redes feed-forward.
      - `silu`: Sigmoid Linear Unit — más suave, usada en Llama/PaLM. **Recomendada para nuevos modelos.**
      - `gelu`: Gaussian Error Linear Unit — clásica, usada en BERT/GPT-2/GPT-3. Más estable para modelos muy pequeños.

      **Impacto:** La diferencia es sutil en la práctica. `silu` tiende a converger más rápido.
      With BitNet or quantization, `silu` may be more robust.
    enum: [silu, gelu]
    examples: [gelu]
  mode:
    type: string
    title: "Transformer Mode"
    title_es: "Modo Transformer"
    description: |
      Controls attention masking. `encoder` = bidirectional attention. `decoder` = causal masking
      for autoregressive next-token prediction. When `model_class=frankesteindecoder`, runtime forces `decoder`.

      **Impact:** `encoder` allows each token to attend to all others (BERT-style). `decoder` only
      allows attending to previous tokens (GPT-style). Changing modes fundamentally changes the task.
    description_es: |
      Controla el enmascaramiento de atención. `encoder` = atención bidireccional. `decoder` = máscara
      causal para predicción autorregresiva de siguiente token. Con `model_class=frankesteindecoder`,
      se fuerza `decoder` en ejecución.

      **Impacto:** `encoder` permite que cada token atienda a todos los demás (tipo BERT). `decoder` solo
      allows attending to previous tokens (GPT-style). Changing modes fundamentally changes the task.
    enum: [encoder, decoder]
    examples: [encoder, decoder]
  engram_max_ngram_size:
    type: integer
    title: "Engram Max N-gram Size"
    title_es: "Tamaño Máximo de N-grama Engram"
    description: |
      Highest N-gram order for the Engram conditional memory module (arXiv:2601.07372).
      Builds lookup tables for all N-gram sizes from 2 up to this value. 3 = bigrams + trigrams.
      Only when `engram_attn` appears in `layer_pattern`.

      **Impact:** Higher values give richer context keys but increase the number of
      embedding tables quadratically.
    description_es: |
      Orden máximo de N-grama para el módulo de memoria condicional Engram (arXiv:2601.07372).
      Construye tablas de búsqueda para todos los tamaños de N-grama desde 2 hasta este valor.
      3 = bigramas + trigramas. Solo cuando `engram_attn` aparece en `layer_pattern`.

      **Impacto:** Valores mayores dan claves de contexto más ricas pero aumentan el número de
      embedding tables quadratically.
    examples: [3]
  engram_n_heads_per_ngram:
    type: integer
    title: "Engram Hash Heads per N-gram"
    title_es: "Cabezas Hash Engram por N-grama"
    description: |
      Independent hash functions (heads) per N-gram order in the Engram module. Each head uses
      a different prime modulus for statistically independent collisions. More heads = more retrieval
      diversity, more embedding params. Only when `engram_attn` in `layer_pattern`.

      **Impact:** Typical: 4–8. Total Engram params grow with: (max_ngram-1) × n_heads × embed_dim.
    description_es: |
      Funciones hash independientes (cabezas) por orden de N-grama en el módulo Engram. Cada
      cabeza usa un módulo primo diferente para colisiones estadísticamente independientes. Más cabezas
      = más diversidad de recuperación, más parámetros de embedding. Solo con `engram_attn` en `layer_pattern`.

      **Impacto:** Típico: 4–8. Total Engram params crecen con: (max_ngram-1) × n_heads × embed_dim.
    examples: [4]
  engram_embed_dim_per_head:
    type: integer
    title: "Engram Embed Dim per Head"
    title_es: "Dim de Embedding Engram por Cabeza"
    description: |
      Dimensionality of each per-head N-gram embedding. Total Engram hidden size =
      `(max_ngram_size-1) × n_heads_per_ngram × embed_dim_per_head`. Typical: 16–64 (small), 128+ (large).
      Only when `engram_attn` in `layer_pattern`.

      **Impact:** Lower = memory savings. Higher = more expressivity. With max_ngram=3, heads=4, dim=32:
      total = 2 × 4 × 32 = 256 channels.
    description_es: |
      Dimensionalidad de cada embedding N-grama por cabeza. Tamaño total oculto de Engram =
      `(max_ngram_size-1) × n_heads_per_ngram × embed_dim_per_head`. Típico: 16–64 (pequeño), 128+ (grande).
      Solo con `engram_attn` en `layer_pattern`.

      **Impacto:** Menor = ahorro de memoria. Mayor = más expresividad. Con max_ngram=3, heads=4, dim=32:
      total = 2 × 4 × 32 = 256 channels.
    examples: [32]
  engram_kernel_size:
    type: integer
    title: "Engram ShortConv Kernel"
    title_es: "Kernel de ShortConv Engram"
    description: |
      Kernel width of causal depthwise conv on retrieved N-gram embeddings. Typical: 3–8.
      Dilated by `max_ngram_size` → effective receptive field = `kernel_size × max_ngram_size` tokens.
      Only when `engram_attn` in `layer_pattern`.

      **Impact:** Larger kernels capture wider local context in the embedding space.
    description_es: |
      Ancho del kernel de convolución causal depthwise sobre embeddings N-grama recuperados.
      Típico: 3–8. Dilatado por `max_ngram_size` → campo receptivo efectivo = `kernel_size × max_ngram_size` tokens.
      Solo con `engram_attn` en `layer_pattern`.

      **Impacto:** Kernels más grandes capturan contexto local más amplio en el espacio de embedding.
    examples: [4]
  engram_seed:
    type: integer
    title: "Engram Hash Seed"
    title_es: "Semilla de Hash Engram"
    description: |
      Random seed for generating odd multipliers for N-gram hashing in the Engram module.
      Changing produces a different but equally valid hash mapping. Fixed value for reproducibility.
      Only when `engram_attn` in `layer_pattern`.

      **Impact:** Affects which tokens collide in hash space. Use 42 for standard
      reproducibility. Change if adverse collisions are suspected.
    description_es: |
      Semilla aleatoria para generar multiplicadores impares para hashing de N-gramas en el
      módulo Engram. Cambiarla produce un mapeo hash diferente pero igualmente válido. Valor fijo para
      reproducibilidad. Solo con `engram_attn` en `layer_pattern`.

      **Impacto:** Afecta qué tokens colisionan en el espacio hash. Usar 42 para reproducibilidad
      reproducibility. Change if adverse collisions are suspected.
    examples: [42]

  # =====================================================================
  # Latent / KV-compression attention family (arXiv:2506.09342, 2605.15250,
  # 2603.02188, 2603.30033, 2602.21371, 2506.17286, 2505.13544)
  # =====================================================================
  mla_latent_rank:
    type: integer
    title: "MLA Latent Rank"
    title_es: "Rango Latente MLA"
    description: |-
      Rank of the joint key-value latent for `mla_attn` (Multi-Head Latent
      Attention, arXiv:2506.09342). The paper's Pareto-optimal setting is
      `hidden_size // 2` with RoPE, which halves the KV cache while
      matching MHA quality. Set to `null` (the default) to use
      `hidden_size // 2`. Only applies when `mla_attn` appears in
      `layer_pattern`.

      **Examples explained:**
      - `mla_latent_rank=384` with `hidden_size=768`: half-rank latent, the
        paper's recommended setting. ~50% KV-cache reduction with negligible
        quality loss on small models.
      - `mla_latent_rank=192` with `hidden_size=768`: quarter-rank, more
        aggressive compression. Larger quality impact, useful for very
        cache-constrained deployment.
      - `mla_latent_rank=null`: defaults to `hidden_size // 2`.
    description_es: |-
      Rango del latente conjunto clave-valor para `mla_attn` (Multi-Head
      Latent Attention, arXiv:2506.09342). La configuración Pareto-óptima del
      paper es `hidden_size // 2` con RoPE, lo que reduce a la mitad el caché
      KV manteniendo la calidad de MHA. `null` (por defecto) usa
      `hidden_size // 2`. Solo aplica cuando `mla_attn` está en `layer_pattern`.
    examples: [384]
  gqla_latent_rank:
    type: integer
    title: "GQLA Latent Rank"
    title_es: "Rango Latente GQLA"
    description: |-
      Rank of the joint KV latent for `gqla_attn` (Group-Query Latent
      Attention, arXiv:2605.15250). `null` defaults to `hidden_size // 2`.
      Only applies when `gqla_attn` is in `layer_pattern`.
    description_es: |-
      Rango del latente KV conjunto para `gqla_attn` (Group-Query Latent
      Attention, arXiv:2605.15250). `null` por defecto es `hidden_size // 2`.
      Solo aplica cuando `gqla_attn` está en `layer_pattern`.
    examples: [384]
  gqla_num_groups:
    type: integer
    title: "GQLA Number of Groups"
    title_es: "Número de Grupos GQLA"
    description: |-
      Number of GQA groups used by the expanded `gqa` decoding path of
      `gqla_attn`. Must divide `num_heads` evenly. `null` defaults to
      `num_heads // 4`. Only applies when `gqla_attn` is in `layer_pattern`.
    description_es: |-
      Número de grupos GQA usados por la ruta de decodificación `gqa`
      expandida de `gqla_attn`. Debe dividir `num_heads`. `null` por
      defecto es `num_heads // 4`. Solo aplica con `gqla_attn`.
    examples: [4]
  gqla_decode_path:
    type: string
    title: "GQLA Decode Path"
    title_es: "Ruta de Decodificación GQLA"
    description: |-
      Selected decoding path for `gqla_attn`. `"mqa_absorb"` matches MLA's
      absorbed MQA form (best for H100-class bandwidth). `"gqa"` expands the
      latent into per-group full heads (best for commodity GPUs with MTP).
      Both paths are algebraically equivalent for the forward output.
    description_es: |-
      Ruta de decodificación seleccionada para `gqla_attn`. `"mqa_absorb"`
      corresponde a la forma MQA absorbida de MLA (mejor para H100).
      `"gqa"` expande el latente en cabezas completas por grupo (mejor para
      GPUs commodity con MTP). Ambas rutas son algebraicamente equivalentes.
    enum: [mqa_absorb, gqa]
    examples: [gqa]
  mlra_latent_rank:
    type: integer
    title: "MLRA Latent Rank"
    title_es: "Rango Latente MLRA"
    description: |-
      Total latent rank for `mlra_attn` (Multi-Head Low-Rank Attention,
      arXiv:2603.02188), partitioned across `mlra_num_latent_heads`
      sub-heads for tensor-parallel decoding. `null` defaults to
      `hidden_size // 2`. Must be divisible by `mlra_num_latent_heads`.
    description_es: |-
      Rango latente total para `mlra_attn` (Multi-Head Low-Rank Attention,
      arXiv:2603.02188), particionado entre `mlra_num_latent_heads`
      sub-cabezas para decodificación tensor-paralela. `null` por defecto es
      `hidden_size // 2`. Debe ser divisible por `mlra_num_latent_heads`.
    examples: [384]
  mlra_num_latent_heads:
    type: integer
    title: "MLRA Latent Heads"
    title_es: "Cabezas Latentes MLRA"
    description: |-
      Number of disjoint latent sub-spaces for `mlra_attn`. Enables
      partitionable 4-way tensor-parallel decoding (each device loads a
      disjoint slice). Must divide `mlra_latent_rank` evenly. Default: 4.
    description_es: |-
      Número de sub-espacios latentes disjuntos para `mlra_attn`. Habilita
      decodificación tensor-paralela de 4 vías (cada dispositivo carga un
      slice disjunto). Debe dividir `mlra_latent_rank`. Por defecto: 4.
    examples: [4]
  tucker_query_rank:
    type: integer
    title: "Tucker Query Rank"
    title_es: "Rango de Query Tucker"
    description: |-
      Tucker rank along the hidden axis for the query weight tensor of
      `tucker_attn` (arXiv:2603.30033). `null` defaults to `hidden_size`
      (recovers MHA query rank). Special cases: MHA = `hidden_size`;
      MLA = latent rank.
    description_es: |-
      Rango Tucker a lo largo del eje oculto para el tensor de pesos de
      query de `tucker_attn` (arXiv:2603.30033). `null` por defecto es
      `hidden_size` (recupera el rango de query de MHA).
    examples: [768]
  tucker_key_rank:
    type: integer
    title: "Tucker Key Rank"
    title_es: "Rango de Key Tucker"
    description: |-
      Tucker rank for the key weight tensor of `tucker_attn`. `null`
      defaults to `hidden_size // 2`. Setting `key_rank = value_rank =
      hidden_size` recovers MHA; setting both to a small latent rank
      recovers MLA.
    description_es: |-
      Rango Tucker para el tensor de pesos de key de `tucker_attn`. `null`
      por defecto es `hidden_size // 2`. Igualar `key_rank = value_rank =
      hidden_size` recupera MHA; igualar ambos a un rango latente pequeño
      recupera MLA.
    examples: [384]
  tucker_value_rank:
    type: integer
    title: "Tucker Value Rank"
    title_es: "Rango de Value Tucker"
    description: |-
      Tucker rank for the value weight tensor of `tucker_attn`. `null`
      defaults to `hidden_size // 2`. See `tucker_key_rank` for the
      MHA/MLA special cases.
    description_es: |-
      Rango Tucker para el tensor de pesos de value de `tucker_attn`. `null`
      por defecto es `hidden_size // 2`. Ver `tucker_key_rank` para los
      casos especiales MHA/MLA.
    examples: [384]
  iha_num_pseudo_heads:
    type: integer
    title: "IHA Pseudo-Heads"
    title_es: "Pseudo-Cabezas IHA"
    description: |-
      Number of pseudo-heads `P` per head for `iha_attn` (Interleaved Head
      Attention, arXiv:2602.21371). Typically `P = num_heads`. Pseudo
      Q/K/V are learned linear combinations of all `H` original heads,
      inducing up to `P**2` attention patterns per head with modest
      `O(H**2 * P)` parameter overhead. `null` defaults to `num_heads`.
    description_es: |-
      Número de pseudo-cabezas `P` por cabeza para `iha_attn` (Interleaved
      Head Attention, arXiv:2602.21371). Típicamente `P = num_heads`. Las
      pseudo Q/K/V son combinaciones lineales aprendidas de todas las `H`
      cabezas originales, induciendo hasta `P**2` patrones de atención por
      cabeza con overhead `O(H**2 * P)`. `null` por defecto es `num_heads`.
    examples: [12]
  gta_num_shared_groups:
    type: integer
    title: "GTA Shared Groups"
    title_es: "Grupos Compartidos GTA"
    description: |-
      Number of head groups sharing a single attention map for `gta_attn`
      (Grouped-head laTenT Attention, arXiv:2506.17286). Must divide
      `num_heads`. `null` defaults to `num_heads // 4`. Smaller values =
      more sharing = smaller key cache.
    description_es: |-
      Número de grupos de cabezas que comparten un único mapa de atención
      para `gta_attn` (Grouped-head laTenT Attention, arXiv:2506.17286).
      Debe dividir `num_heads`. `null` por defecto es `num_heads // 4`.
      Valores menores = más compartir = menor caché de claves.
    examples: [4]
  gta_value_latent_rank:
    type: integer
    title: "GTA Value Latent Rank"
    title_es: "Rango Latente de Value GTA"
    description: |-
      Rank of the value-cache latent for `gta_attn`. The value cache is
      compressed by a down-projection and reconstructed by a non-linear
      (silu) decoder. `null` defaults to `hidden_size // 2`.
    description_es: |-
      Rango del latente del caché de valores para `gta_attn`. El caché de
      valores se comprime con una proyección de bajada y se reconstruye con
      un decodificador no lineal (silu). `null` por defecto es
      `hidden_size // 2`.
    examples: [384]
  mtla_latent_rank:
    type: integer
    title: "MTLA Latent Rank"
    title_es: "Rango Latente MTLA"
    description: |-
      Latent rank along the feature axis for `mtla_attn` (Multi-head
      Temporal Latent Attention, arXiv:2505.13544). `null` defaults to
      `hidden_size // 2`.
    description_es: |-
      Rango latente a lo largo del eje de features para `mtla_attn`
      (Multi-head Temporal Latent Attention, arXiv:2505.13544). `null` por
      defecto es `hidden_size // 2`.
    examples: [384]
  mtla_merge_factor:
    type: integer
    title: "MTLA Merge Factor"
    title_es: "Factor de Fusión MTLA"
    description: |-
      Number of consecutive KV cache entries merged into a single
      temporal slot for `mtla_attn`. Shrinks the temporal length by this
      factor. Must be >= 1. Default: 2.
    description_es: |-
      Número de entradas consecutivas del caché KV fusionadas en un único
      slot temporal para `mtla_attn`. Reduce la longitud temporal por este
      factor. Debe ser >= 1. Por defecto: 2.
    examples: [2]
  mtla_stride:
    type: integer
    title: "MTLA Stride"
    title_es: "Stride MTLA"
    description: |-
      Stride between merged temporal slots for `mtla_attn`. `null`
      defaults to `mtla_merge_factor`. Smaller stride = overlapping
      windows; larger stride = non-overlapping.
    description_es: |-
      Stride entre slots temporales fusionados para `mtla_attn`. `null`
      por defecto es `mtla_merge_factor`. Stride menor = ventanas
      superpuestas; stride mayor = no superpuestas.
    examples: [2]

  # =====================================================================
  # MiniMax Sparse Attention (arXiv:2606.13392) and SparDA (arXiv:2606.04511)
  # =====================================================================
  msa_block_size:
    type: integer
    title: "MSA Block Size"
    title_es: "Tamaño de Bloque MSA"
    description: |-
      Block size `B_k` for `msa_attn` (MiniMax Sparse Attention,
      arXiv:2606.13392). Tokens are partitioned into contiguous blocks of
      this size; the Index Branch scores blocks and the Main Branch
      attends to selected blocks. Paper default: 128.
    description_es: |-
      Tamaño de bloque `B_k` para `msa_attn` (MiniMax Sparse Attention,
      arXiv:2606.13392). Los tokens se particionan en bloques contiguos de
      este tamaño; la rama índice puntúa bloques y la rama principal atiende
      a los seleccionados. Por defecto del paper: 128.
    examples: [128]
  msa_topk_blocks:
    type: integer
    title: "MSA Top-k Blocks"
    title_es: "Top-k Bloques MSA"
    description: |-
      Number of blocks selected per GQA group per query for `msa_attn`.
      The block containing the query is always forced into the selected
      set. Paper default: 16 (giving a fixed 2048-token budget per
      query at `block_size=128`).
    description_es: |-
      Número de bloques seleccionados por grupo GQA por consulta para
      `msa_attn`. El bloque que contiene la consulta siempre se incluye.
      Por defecto del paper: 16 (presupuesto fijo de 2048 tokens por
      consulta con `block_size=128`).
    examples: [16]
  msa_index_dim:
    type: integer
    title: "MSA Index Head Dim"
    title_es: "Dim de Cabeza Índice MSA"
    description: |-
      Dimensionality `d_idx` of the Index Branch heads for `msa_attn`.
      Constraint: `num_kv_heads * d_idx << num_heads * head_dim`. Default:
      64. The exact value is an appendix hyperparameter in the paper.
    description_es: |-
      Dimensionalidad `d_idx` de las cabezas de la rama índice para
      `msa_attn`. Restricción: `num_kv_heads * d_idx << num_heads *
      head_dim`. Por defecto: 64.
    examples: [64]
  msa_kl_loss_weight:
    type: number
    title: "MSA KL Loss Weight"
    title_es: "Peso de Pérdida KL MSA"
    description: |-
      Weight `lambda` of the KL alignment loss that trains the Index Branch
      of `msa_attn`. Set to 0 to disable (Index Branch then only learns via
      the indexer warmup). The paper leaves the exact value to appendix
      ablations. Default: 0.0.
    description_es: |-
      Peso `lambda` de la pérdida de alineación KL que entrena la rama
      índice de `msa_attn`. 0 para deshabilitar. El paper deja el valor
      exacto a ablacions del apéndice. Por defecto: 0.0.
    examples: [0.0]
  sparda_block_size:
    type: integer
    title: "SparDA Block Size"
    title_es: "Tamaño de Bloque SparDA"
    description: |-
      KV block size for `sparda_attn` (SparDA, arXiv:2606.04511). The
      Forecast projection scores blocks of this size. Default: 128.
    description_es: |-
      Tamaño de bloque KV para `sparda_attn` (SparDA, arXiv:2606.04511). La
      proyección Forecast puntúa bloques de este tamaño. Por defecto: 128.
    examples: [128]
  sparda_topk_blocks:
    type: integer
    title: "SparDA Top-k Blocks"
    title_es: "Top-k Bloques SparDA"
    description: |-
      Number of KV blocks selected per GQA group per query for
      `sparda_attn`. Default: 16.
    description_es: |-
      Número de bloques KV seleccionados por grupo GQA por consulta para
      `sparda_attn`. Por defecto: 16.
    examples: [16]
  sparda_forecast_dim:
    type: integer
    title: "SparDA Forecast Dim"
    title_es: "Dim de Forecast SparDA"
    description: |-
      Dimensionality of the Forecast projection for `sparda_attn`. One
      Forecast head per GQA group. Default: 64.
    description_es: |-
      Dimensionalidad de la proyección Forecast para `sparda_attn`. Una
      cabeza Forecast por grupo GQA. Por defecto: 64.
    examples: [64]
