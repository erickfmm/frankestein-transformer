allOf:
  - anyOf:
      - required: [base_model]
      - required: [model_class, model]
  - if:
      properties:
        training:
          properties:
            task:
              const: mlm
    then:
      properties:
        training:
          required: [optimizer]
  - if:
      properties:
        training:
          properties:
            task:
              const: sbert
    then:
      properties:
        training:
          required: [sbert]
  - if:
      required: [base_model]
    then:
      properties:
        training:
          required:
            - task
      allOf:
        - if:
            properties:
              training:
                properties:
                  task:
                    const: mlm
          then:
            properties:
              tokenizer:
                required: [name_or_path]
  - if:
      not:
        required: [base_model]
    then:
      required: [model_class, model]

examples:
  - model_class: frankenstein
    model:
      vocab_size: 50000
      hidden_size: 768
      num_layers: 12
      num_loops: 1
      num_heads: 12
      retention_heads: 12
      num_experts: 4
      top_k_experts: 2
      dropout: 0.1
      layer_pattern: [standard_attn]
      ode_solver: rk4
      ode_steps: 2
      use_bitnet: false
      norm_type: layer_norm
      use_factorized_embedding: false
      factorized_embedding_dim: 128
      use_embedding_conv: false
      embedding_conv_kernel: 3
      positional_encoding: hope
      hope_base: 10000.0
      hope_damping: 0.01
      rope_base: 10000.0
      rope_scaling: 1.0
      use_hope: false
      use_moe: false
      ffn_hidden_size: 3072
      ffn_activation: gelu
    training:
      task: mlm
      batch_size: 4
      dataloader_workers: 2
      max_length: 512
      mlm_probability: 0.15
      max_samples: 20000000
      dataset_batch_size: 25000
      num_workers: 8
      cache_dir: "./temp_data/v2_dataset_cache"
      use_amp: false
      gradient_accumulation_steps: 4
      optimizer:
        optimizer_class: adamw
        parameters:
          adamw-lr_embeddings: 1e-6
          adamw-lr_norms: 5e-6
          adamw-lr_ode: 1e-7
          adamw-lr_retnet: 5e-6
          adamw-lr_mamba: 2e-6
          adamw-lr_attention: 3e-6
          adamw-lr_other: 2e-6
          adamw-wd_embeddings: 0.01
          adamw-wd_norms: 0.001
          adamw-wd_ode: 0.01
          adamw-wd_retnet: 0.01
          adamw-wd_mamba: 0.01
          adamw-wd_attention: 0.01
          adamw-wd_other: 0.01
          adamw-betas_embeddings: [0.9, 0.95]
          adamw-betas_norms: [0.9, 0.95]
          adamw-betas_ode: [0.9, 0.95]
          adamw-betas_retnet: [0.9, 0.95]
          adamw-betas_mamba: [0.9, 0.95]
          adamw-betas_attention: [0.9, 0.95]
          adamw-betas_other: [0.9, 0.95]
          adamw-eps_embeddings: 1e-8
          adamw-eps_norms: 1e-8
          adamw-eps_ode: 1e-8
          adamw-eps_retnet: 1e-8
          adamw-eps_mamba: 1e-8
          adamw-eps_attention: 1e-8
          adamw-eps_other: 1e-8
      scheduler_total_steps: 10000
      scheduler_warmup_ratio: 0.1
      scheduler_type: cosine
      grad_clip_max_norm: 5.0
      inf_post_clip_threshold: 100.0
      max_nan_retries: 3
      checkpoint_every_n_steps: 500
      max_rolling_checkpoints: 3
      num_best_checkpoints: 2
      nan_check_interval: 10
      log_gradient_stats: true
      gradient_log_interval: 10
      csv_log_path: "training_metrics.csv"
      csv_rotate_on_schema_change: true
      gpu_metrics_backend: nvml
      nvml_device_index: 0
      enable_block_grad_norms: true
      telemetry_log_interval: 1
      gpu_temp_guard_enabled: true
      switch_on_thermal: false
      gpu_temp_pause_threshold_c: 90.0
      gpu_temp_resume_threshold_c: 80.0
      gpu_temp_critical_threshold_c:
      gpu_temp_poll_interval_seconds: 30.0
      use_galore: false
      galore_rank: 64
      galore_update_interval: 1
      galore_scale: 1.0
      galore_max_dim: 4096
