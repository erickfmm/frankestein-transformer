        then:
          properties:
            optimizer:
              properties:
                parameters:
                  additionalProperties: false
                  patternProperties:
                    "^adan-": {}
      - if:
          properties:
            optimizer:
              properties:
                optimizer_class:
                  const: adopt
        then:
          properties:
            optimizer:
              properties:
                parameters:
                  additionalProperties: false
                  patternProperties:
                    "^adopt-": {}
      - if:
          properties:
            optimizer:
              properties:
                optimizer_class:
                  const: ademamix
        then:
          properties:
            optimizer:
              properties:
                parameters:
                  additionalProperties: false
                  patternProperties:
                    "^ademamix-": {}
      - if:
